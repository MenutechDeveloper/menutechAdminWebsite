<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Layouts Verification</title>
    <style>
        body { background: #121418; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; margin: 0; }
        section { margin-bottom: 80px; border-bottom: 1px solid #2d333f; padding-bottom: 40px; }
        h2 { color: #ff9533; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin-bottom: 30px; text-align: center; }
    </style>
</head>
<body>
    <script src="docs/menutechUI.js"></script>

    <section id="grid">
        <h2>Grid Layout (Original)</h2>
        <menutech-gallery type="grid" images-list="https://images.unsplash.com/photo-1504674900247-0877df9cc836,https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1,https://images.unsplash.com/photo-1493770348161-369560ae357d,https://images.unsplash.com/photo-1473093226795-af9932fe5856,https://images.unsplash.com/photo-1540189549336-e6e99c3679fe"></menutech-gallery>
    </section>

    <section id="slider">
        <h2>Slider Layout (1200px Max-Width)</h2>
        <menutech-gallery type="slider" images-list="https://images.unsplash.com/photo-1504674900247-0877df9cc836,https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1,https://images.unsplash.com/photo-1493770348161-369560ae357d,https://images.unsplash.com/photo-1473093226795-af9932fe5856"></menutech-gallery>
    </section>

    <section id="bento">
        <h2>Bento Layout (6 Columns)</h2>
        <menutech-gallery type="bento" images-list="https://images.unsplash.com/photo-1504674900247-0877df9cc836#s=3x3,https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1#s=3x2,https://images.unsplash.com/photo-1493770348161-369560ae357d#s=2x1,https://images.unsplash.com/photo-1473093226795-af9932fe5856#s=4x1"></menutech-gallery>
    </section>

    <section id="bento-admin">
        <h2>Bento Layout (Admin Mode)</h2>
        <menutech-gallery type="bento" admin-mode images-list="https://images.unsplash.com/photo-1504674900247-0877df9cc836#s=2x2,https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1#s=1x2,https://images.unsplash.com/photo-1493770348161-369560ae357d#s=1x1,https://images.unsplash.com/photo-1473093226795-af9932fe5856#s=2x1"></menutech-gallery>
    </section>
</body>
</html>
