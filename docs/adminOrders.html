<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management | Menutech</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --success: #059669;
            --error: #dc2626;
            --dev: #8b5cf6;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 72px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .dashboard-layout { display: flex; min-height: calc(100vh - 160px); gap: 40px; }

        /* Unified Sidebar Container */
        .sidebar-container {
            position: fixed; left: 0; top: 120px; z-index: 6000; pointer-events: none; display: flex; align-items: flex-start;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-container > * { pointer-events: auto; }
        .sidebar-container.collapsed { transform: translateX(-340px) !important; }

        .sidebar { width: 340px; height: 600px; display: flex; flex-direction: column; gap: 20px; }
        .main-content { flex: 1; min-width: 0; }

        .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 24px; position: relative; cursor: default; transition: opacity 0.3s; user-select: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.15); height: 100%; display: flex; flex-direction: column; }
        .search-box label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 15px; margin-left: 5px; pointer-events: none; }
        .search-box input { width: 100%; margin-bottom: 15px; border-radius: 16px; padding: 14px; background: var(--input); border: 1px solid var(--border); color: var(--text); }

        .client-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .client-list::-webkit-scrollbar { width: 4px; }
        .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .client-item { padding: 14px 18px; border-radius: 16px; background: var(--input); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .client-item:hover { border-color: var(--orange); }
        .client-item.active { border-color: var(--orange); background: rgba(255,149,51,0.08); }
        .client-item .name { font-weight: 700; font-size: 0.85rem; display: block; }
        .client-item .domain { font-size: 0.7rem; color: var(--text-dim); }

        .sidebar-tab {
            width: 45px; height: 160px; background: var(--orange); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; cursor: pointer; writing-mode: vertical-lr; text-orientation: mixed; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; box-shadow: 10px 0 30px rgba(255, 149, 51, 0.2); transition: 0.4s; margin-top: 40px; position: relative;
        }
        .sidebar-tab:hover { width: 55px; padding-left: 10px; }

        .component-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .component-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; }

        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        /* Premium User Pill */
        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto; min-width: 220px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.15); }

        #user-display-pill.admin-glow {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.admin-glow #user-name, #user-display-pill.admin-glow #user-role-label { color: #3e2b14 !important; }

        #user-display-pill.dev-glow {
            background: linear-gradient(135deg, #70706F 0%, #E9E9E7 20%, #70706F 40%, #E9E9E7 60%, #70706F 80%, #E9E9E7 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.dev-glow #user-name, #user-display-pill.dev-glow #user-role-label { color: #1e293b !important; }

        #user-display-pill.owner-glow {
            background: #000;
            background-image: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%, rgba(255,255,255,0.1) 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.owner-glow #user-name, #user-display-pill.owner-glow #user-role-label { color: #fff !important; }

        #user-display-pill #user-name, #user-display-pill #user-role-label { color: var(--text); transition: color 0.3s; }

        @keyframes foil-shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.85rem; font-family: 'Outfit', sans-serif; }
        #user-role-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .pill-menu {
            position: absolute; top: calc(100% + 12px); right: 0; background: var(--card) !important; border: 1px solid var(--border);
            border-radius: 24px; padding: 12px; min-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000;
            animation: none !important;
        }
        #user-display-pill.active .pill-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .pill-menu-item {
            padding: 12px 18px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text);
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .pill-menu-item:hover { background: rgba(255, 149, 51, 0.1); color: var(--orange); }
        .pill-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .theme-switch {
            width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); pointer-events: auto; }
        .theme-switch:hover { transform: translateY(-2px); border-color: var(--orange); }

        .theme-switch svg { width: 24px; height: 24px; transition: 0.4s; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; pointer-events: auto; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); filter: brightness(1.1); }

        .btn-copy {
            background: #fff5eb;
            border: 1px solid #ffd8b0;
            color: var(--orange);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        .btn-copy:hover { background: var(--orange); color: #fff; }

        .orders-grid { display: grid; gap: 24px; }
        .order-card {
            background: var(--card); border: 1.5px solid var(--border); border-radius: 24px;
            padding: 30px; transition: 0.3s; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .order-card.pending { border-left: 8px solid var(--orange); }
        .order-card.accepted { border-left: 8px solid var(--success); }
        .order-card.rejected { border-left: 8px solid var(--error); opacity: 0.7; }

        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .cust-info h3 { font-family: 'Outfit', sans-serif; font-size: 1.4rem; margin-bottom: 5px; }
        .cust-info p { font-size: 0.9rem; color: var(--text-dim); }

        .order-details-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;
            padding: 15px; background: var(--input); border-radius: 18px; font-size: 0.85rem;
        }
        .detail-item strong { display: block; color: var(--orange); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 2px; }

        .order-items { margin: 20px 0; padding: 20px; background: var(--input); border-radius: 18px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
        .item-details { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; padding-left: 10px; }

        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .total-price { font-size: 1.5rem; font-weight: 800; color: var(--orange); }

        .actions { display: flex; gap: 15px; }
        .btn {
            padding: 12px 24px; border-radius: 14px; border: none; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 0.85rem;
        }
        .btn-accept { background: var(--success); color: #fff; }
        .btn-reject { background: var(--error); color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-badge {
            position: absolute; top: 20px; right: 20px; padding: 6px 14px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }
        .pending .status-badge { background: rgba(255,149,51,0.15); color: var(--orange); }
        .accepted .status-badge { background: rgba(5,150,105,0.15); color: var(--success); }
        .rejected .status-badge { background: rgba(220,38,38,0.15); color: var(--error); }

        .empty-state { text-align: center; padding: 100px 20px; color: var(--text-dim); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 20px; opacity: 0.3; }

        .hidden { display: none !important; }

        /* Toast Notification */
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 20000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; max-width: 440px; padding: 18px 24px; border-radius: 24px; background: #1c1f26; border: 1px solid var(--border); color: #fff; font-size: 0.9rem; font-weight: 500; box-shadow: 0 12px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), toastFadeOut 0.5s 5.5s forwards; line-height: 1.4; }
        .toast.success { border-left: 6px solid var(--success); }
        .toast.error { border-left: 6px solid var(--error); }
        .toast.warning { border-left: 6px solid var(--orange); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastFadeOut { from { opacity: 1; } to { opacity: 0; } }

        .loader { border: 3px solid rgba(255, 149, 51, 0.1); width: 28px; height: 28px; border-radius: 50%; border-left-color: var(--orange); animation: rotate 1s linear infinite; margin: 0 auto; }
        @keyframes rotate { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <div id="top-nav" class="hidden">
        <div><button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-switch" id="theme-toggle">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div id="user-display-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px; height:20px; color: inherit;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div class="pill-info">
                    <div id="user-name">&nbsp;</div>
                    <div id="user-role-label">&nbsp;</div>
                </div>
                <div class="pill-menu">
                    <a href="index.html" class="pill-menu-item">Home</a>
                    <div class="pill-menu-item danger" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <img src="https://menutech.services/assets/img/logomt.png" class="logo-main" alt="Menutech Logo">
            <h1 style="font-family:'Outfit';">Real-time Orders</h1>
            <p id="orders-subtitle" style="color:var(--text-dim); margin-top:10px;">Waiting for new orders...</p>
        </header>

        <div class="dashboard-layout">
            <div class="sidebar-container hidden" id="sidebar-container">
                <div class="sidebar" id="sidebar">
                    <div class="search-box">
                        <label>Find Project</label>
                        <input type="text" id="client-search" placeholder="Domain or Name...">
                        <div class="client-list" id="client-list"></div>
                        <div id="project-info" class="switcher-box hidden" style="width: 100%; margin: 0; padding-top: 15px; border-top: 1px solid var(--border); margin-top: auto;">
                            <label>Active Project</label>
                            <div id="active-project-name" style="font-weight: 700; padding: 12px; background: var(--input); border-radius: 14px; border: 1px solid var(--border); font-size: 0.8rem; margin-top: 8px;">None Selected</div>
                        </div>
                    </div>
                </div>
                <div class="sidebar-tab" id="sidebar-tab">Find Project</div>
            </div>

            <div class="main-content">
                <div id="snippet-section" class="hidden" style="display: flex; justify-content: center; margin-bottom: 40px;">
                    <button id="btn-copy-snippet" class="btn-copy" style="width: 100%; max-width: 800px;">COPY ORDERS CODE</button>
                </div>
                <div id="orders-list" class="orders-grid">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p>No orders yet. They will appear here in real-time.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase as sb } from './supabase.js';

        let user = null, userRole = null, activeOwnerId = null;
        let orders = [];
        let allOwners = [];
        let ordersChannel = null;

        async function init() {
            initTheme();
            initEvents();

            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = 'index.html'; return; }
            user = session.user;

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();

            userRole = (profile?.role || 'OWNER').trim().toUpperCase();
            activeOwnerId = user.id;

            const csRoles = ['CS', 'ADMINCS'];
            const adminRoles = ['ADMIN', 'DEVELOPER'];

            if (adminRoles.includes(userRole) || csRoles.includes(userRole)) {
                document.getElementById('sidebar-container').classList.remove('hidden');
                document.getElementById('sidebar-container').classList.add('collapsed');
                document.getElementById('snippet-section').classList.remove('hidden');
                await setupContextSwitcher();
            }

            showApp(profile);
            loadOrders();
            subscribeToOrders();
        }

        async function showApp(profile) {
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('top-nav').classList.remove('hidden');

            const pill = document.getElementById('user-display-pill');
            const nameEl = document.getElementById('user-name');
            const roleEl = document.getElementById('user-role-label');

            if (profile) {
                nameEl.textContent = profile.username || user.email.split('@')[0];
                roleEl.textContent = profile.role || 'User';
                const role = (profile.role || 'user').trim().toUpperCase();
                if (role === 'ADMIN') pill.classList.add('admin-glow');
                else if (role === 'DEVELOPER') pill.classList.add('dev-glow');
                else pill.classList.add('owner-glow');
            } else {
                nameEl.textContent = user.email.split('@')[0];
                roleEl.textContent = 'Owner';
                pill.classList.add('owner-glow');
            }
        }

        async function setupContextSwitcher() {
            const { data } = await sb.from('profiles').select('*');
            allOwners = data || [];
            renderOwners(allOwners);
            document.getElementById('client-search').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                renderOwners(allOwners.filter(o => (o.username||'').toLowerCase().includes(term) || (o.domain||'').toLowerCase().includes(term)));
            };
        }

        function renderOwners(owners) {
            const list = document.getElementById('client-list');
            list.innerHTML = owners.map(o => `<div class="client-item ${activeOwnerId === o.id ? 'active' : ''}" onclick="switchContext('${o.id}')"><span class="name">${o.username || 'User'}</span><span class="domain">${o.domain || o.id.substring(0,8)}</span></div>`).join('');
        }

        window.switchContext = async (ownerId) => {
            const owner = allOwners.find(o => o.id === ownerId);
            if (!owner) return;
            activeOwnerId = ownerId;
            document.getElementById('active-project-name').textContent = owner.username || owner.email;
            document.getElementById('project-info').classList.remove('hidden');
            renderOwners(allOwners);

            // Cleanup previous subscription
            if (ordersChannel) {
                sb.removeChannel(ordersChannel);
            }

            loadOrders();
            subscribeToOrders();
        }

        async function loadOrders() {
            const { data, error } = await sb.from('menutech_orders')
                .select('*')
                .eq('user_id', activeOwnerId)
                .order('created_at', { ascending: false });

            if (data) {
                orders = data;
                renderOrders();
            }
        }

        function subscribeToOrders() {
            ordersChannel = sb.channel('menutech_orders_' + activeOwnerId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'menutech_orders',
                    filter: `user_id=eq.${activeOwnerId}`
                }, (payload) => {
                    orders.unshift(payload.new);
                    renderOrders();
                    playNotification();
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'menutech_orders',
                    filter: `user_id=eq.${activeOwnerId}`
                }, (payload) => {
                    const idx = orders.findIndex(o => o.id === payload.new.id);
                    if (idx !== -1) {
                        orders[idx] = payload.new;
                        renderOrders();
                    }
                })
                .subscribe();
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            if (orders.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p>No orders yet. They will appear here in real-time.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="order-card ${order.status}">
                    <div class="status-badge">${order.status}</div>
                    <div class="order-header">
                        <div class="cust-info">
                            <h3>${order.customer_name}</h3>
                            <p>${order.customer_phone}</p>
                            <p>${new Date(order.created_at).toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="order-details-grid">
                        <div class="detail-item"><strong>Tipo</strong>${order.order_type === 'delivery' ? 'Domicilio' : 'Recoger'}</div>
                        <div class="detail-item"><strong>Pago</strong>${order.payment_method || 'N/A'}</div>
                        <div class="detail-item"><strong>Entrega</strong>${order.delivery_time_mode === 'later' ? `${order.delivery_date} ${order.delivery_time}` : 'Lo antes posible'}</div>
                        ${order.order_type === 'delivery' ? `<div class="detail-item"><strong>Dirección</strong>${order.address}</div>` : ''}
                        ${order.reference ? `<div class="detail-item" style="grid-column: span 2"><strong>Referencia</strong>${order.reference}</div>` : ''}
                    </div>

                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="item-row">
                                <span>${item.quantity > 1 ? item.quantity + 'x ' : ''}${item.name}</span>
                                <strong>$${(item.total || (item.price * (item.quantity || 1))).toFixed(2)}</strong>
                            </div>
                            ${item.size || (item.toppings && item.toppings.length > 0) || item.instructions ? `
                                <div class="item-details">
                                    ${item.size ? `Talla: ${item.size}` : ''}
                                    ${item.toppings && item.toppings.length > 0 ? `<br>Toppings: ${item.toppings.join(', ')}` : ''}
                                    ${item.instructions ? `<br><span style="color:var(--orange); font-style:italic;">Instrucciones: "${item.instructions}"</span>` : ''}
                                </div>
                            ` : ''}
                        `).join('')}
                    </div>

                    ${order.customer_notes || order.instructions ? `<p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:20px;"><strong>Notas:</strong> ${order.customer_notes || ''} ${order.instructions || ''}</p>` : ''}

                    <div class="order-footer">
                        <div class="total-price">Total: $${order.total.toFixed(2)}</div>
                        <div class="actions">
                            <button class="btn btn-whatsapp" onclick="sendWhatsApp('${order.id}')">WhatsApp</button>
                            ${order.status === 'pending' ? `
                                <button class="btn btn-reject" onclick="updateOrderStatus('${order.id}', 'rejected')">Reject</button>
                                <button class="btn btn-accept" onclick="updateOrderStatus('${order.id}', 'accepted')">Accept</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastFadeOut 0.5s forwards';
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        }

        window.updateOrderStatus = async (id, status) => {
            const { error } = await sb.from('menutech_orders')
                .update({ status })
                .eq('id', id);

            if (error) {
                showToast('Error updating order: ' + error.message, 'error');
            } else {
                showToast(`Order ${status} successfully`);
            }
        };

        window.sendWhatsApp = (orderId) => {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            let text = `*NUEVO PEDIDO - ${order.customer_name}*\n\n`;
            order.items.forEach(item => {
                text += `• ${item.quantity}x ${item.name} ($${(item.total || item.price).toFixed(2)})\n`;
                if (item.size) text += `  _Size: ${item.size}_\n`;
                if (item.toppings && item.toppings.length > 0) text += `  _Toppings: ${item.toppings.join(', ')}_\n`;
                if (item.instructions) text += `  _Nota: ${item.instructions}_\n`;
            });

            text += `\n*TOTAL: $${order.total.toFixed(2)}*\n`;
            text += `\n*DETALLES DE ENTREGA*\n`;
            text += `Tipo: ${order.order_type === 'delivery' ? 'Domicilio' : 'Recoger'}\n`;
            if (order.address) text += `Dir: ${order.address}\n`;
            if (order.reference) text += `Ref: ${order.reference}\n`;
            text += `Hora: ${order.delivery_time_mode === 'later' ? `${order.delivery_date} ${order.delivery_time}` : 'Lo antes posible'}\n`;
            text += `Pago: ${order.payment_method === 'cash' ? 'Efectivo' : 'Transferencia'}\n`;

            const phone = order.customer_phone.replace(/\D/g, '');
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        };

        function playNotification() {
            const audio = new Audio('https://menutech.services/assets/audio/notification.mp3');
            audio.play().catch(e => console.log('Audio play blocked'));
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle').onclick = () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            };
        }

        function initEvents() {
            document.getElementById('sidebar-tab').onclick = () => document.getElementById('sidebar-container').classList.toggle('collapsed');
            const pill = document.getElementById('user-display-pill');
            pill.onclick = (e) => { e.stopPropagation(); pill.classList.toggle('active'); };
            document.addEventListener('click', () => pill.classList.remove('active'));
            window.logout = async () => { await sb.auth.signOut(); location.href = "index.html"; };

            document.getElementById('btn-copy-snippet').onclick = () => {
                const domain = allOwners.find(o => o.id === activeOwnerId)?.domain || 'your-domain';
                const snippet = `<!-- Menutech Orders -->\n<script src="https://menutech.io/menutechUI.js"><\/script>\n<menutech-platform-orders domain="${domain}" view="popup"></menutech-platform-orders>`;
                navigator.clipboard.writeText(snippet).then(() => {
                    const btn = document.getElementById('btn-copy-snippet');
                    btn.textContent = "COPIED!";
                    setTimeout(() => btn.textContent = "COPY ORDERS CODE", 2000);
                });
            };
        }

        init();
    </script>
</body>
</html>
