<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Configuration | Menutech</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 72px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .dashboard-layout { display: flex; min-height: calc(100vh - 160px); gap: 40px; }

        /* Unified Sidebar Container */
        .sidebar-container {
            position: fixed; left: 0; top: 120px; z-index: 6000; pointer-events: none; display: flex; align-items: flex-start;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-container > * { pointer-events: auto; }
        .sidebar-container.collapsed { transform: translateX(-340px) !important; }

        .sidebar { width: 340px; height: 600px; display: flex; flex-direction: column; gap: 20px; }
        .main-content { flex: 1; min-width: 0; }

        .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 24px; position: relative; cursor: default; transition: opacity 0.3s; user-select: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.15); height: 100%; display: flex; flex-direction: column; }
        .search-box label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 15px; margin-left: 5px; pointer-events: none; }
        .search-box input { width: 100%; margin-bottom: 15px; border-radius: 16px; padding: 14px; background: var(--input); border: 1px solid var(--border); color: var(--text); }

        .client-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .client-list::-webkit-scrollbar { width: 4px; }
        .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .client-item { padding: 14px 18px; border-radius: 16px; background: var(--input); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .client-item:hover { border-color: var(--orange); }
        .client-item.active { border-color: var(--orange); background: rgba(255,149,51,0.08); }
        .client-item .name { font-weight: 700; font-size: 0.85rem; display: block; }
        .client-item .domain { font-size: 0.7rem; color: var(--text-dim); }

        .sidebar-tab {
            width: 45px; height: 160px; background: var(--orange); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; cursor: pointer; writing-mode: vertical-lr; text-orientation: mixed; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; box-shadow: 10px 0 30px rgba(255, 149, 51, 0.2); transition: 0.4s; margin-top: 40px; position: relative;
        }
        .sidebar-tab:hover { width: 55px; padding-left: 10px; }

        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        /* Premium User Pill */
        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto; min-width: 220px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.15); }

        #user-display-pill.admin-glow {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.admin-glow #user-name, #user-display-pill.admin-glow #user-role-label { color: #3e2b14 !important; }

        #user-display-pill.dev-glow {
            background: linear-gradient(135deg, #70706F 0%, #E9E9E7 20%, #70706F 40%, #E9E9E7 60%, #70706F 80%, #E9E9E7 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.dev-glow #user-name, #user-display-pill.dev-glow #user-role-label { color: #1e293b !important; }

        #user-display-pill.owner-glow {
            background: #000;
            background-image: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%, rgba(255,255,255,0.1) 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.owner-glow #user-name, #user-display-pill.owner-glow #user-role-label { color: #fff !important; }

        #user-display-pill #user-name, #user-display-pill #user-role-label { color: var(--text); transition: color 0.3s; }

        @keyframes foil-shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.85rem; font-family: 'Outfit', sans-serif; }
        #user-role-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .pill-menu {
            position: absolute; top: calc(100% + 12px); right: 0; background: var(--card) !important; border: 1px solid var(--border);
            border-radius: 24px; padding: 12px; min-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000;
            animation: none !important;
        }
        #user-display-pill.active .pill-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .pill-menu-item {
            padding: 12px 18px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text);
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .pill-menu-item:hover { background: rgba(255, 149, 51, 0.1); color: var(--orange); }
        .pill-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .theme-switch {
            width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); pointer-events: auto; }
        .theme-switch:hover { transform: translateY(-2px); border-color: var(--orange); }

        .theme-switch svg { width: 24px; height: 24px; transition: 0.4s; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; pointer-events: auto; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); filter: brightness(1.1); }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 20000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; max-width: 440px; padding: 18px 24px; border-radius: 24px; background: #1c1f26; border: 1px solid var(--border); color: #fff; font-size: 0.9rem; font-weight: 500; box-shadow: 0 12px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), toastFadeOut 0.5s 5.5s forwards; line-height: 1.4; }
        .toast.success { border-left: 6px solid var(--success); }
        .toast.error { border-left: 6px solid var(--error); }
        .toast.warning { border-left: 6px solid var(--orange); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastFadeOut { from { opacity: 1; } to { opacity: 0; } }

        .loader { border: 3px solid rgba(255, 149, 51, 0.1); width: 28px; height: 28px; border-radius: 50%; border-left-color: var(--orange); animation: rotate 1s linear infinite; margin: 0 auto; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        .layout { display: grid; grid-template-columns: 1fr 350px; gap: 40px; }

        .config-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .group { margin-bottom: 24px; }
        .group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--border); background: var(--input); color: var(--text); font-family: inherit; font-size: 0.9rem; }
        textarea { height: 100px; resize: none; }

        .toggle-group { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .toggle { width: 44px; height: 24px; background: #ddd; border-radius: 20px; position: relative; transition: 0.3s; }
        .toggle::after { content: ''; width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s; }
        .toggle.active { background: var(--orange); }
        .toggle.active::after { transform: translateX(20px); }

        .btn-save { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--orange); color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,149,51,0.3); }

        .logo-drop-zone {
            width: 100%; height: 120px; border-radius: 20px; border: 2px dashed var(--border); background: var(--input);
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
            margin-top: 10px; overflow: hidden; position: relative;
        }
        .logo-drop-zone:hover { border-color: var(--orange); background: rgba(255,149,51,0.03); }
        .logo-drop-zone img { height: 80%; object-fit: contain; }
        .logo-drop-zone p { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); }

        .preview-pane { background: #eee; padding: 20px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
        .ticket-preview {
            background: #fff; width: 100%; max-width: 300px; padding: 30px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-family: 'Courier New', Courier, monospace; color: #000;
            display: flex; flex-direction: column; text-align: center; font-size: 13px;
        }
        .preview-header { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .preview-sep { border-top: 1px dashed #000; margin: 10px 0; }
        .preview-body { text-align: left; }
        .preview-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .preview-footer { margin-top: 15px; white-space: pre-wrap; }

        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <div id="top-nav" class="hidden">
        <div>
             <button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-switch" id="theme-toggle">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div id="user-display-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px; height:20px; color: inherit;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div class="pill-info">
                    <div id="user-name">&nbsp;</div>
                    <div id="user-role-label">&nbsp;</div>
                </div>
                <div class="pill-menu">
                    <a href="index.html" class="pill-menu-item">Home</a>
                    <div class="pill-menu-item danger" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <img src="https://menutech.services/assets/img/logomt.png" class="logo-main" alt="Menutech Logo">
            <p id="view-domain-title" style="font-weight: 700; color: var(--orange); font-size: 0.85rem; letter-spacing: 1px;"></p>
        </header>

        <div class="dashboard-layout">
            <!-- Sidebar with Searchable List -->
            <div class="sidebar-container hidden" id="sidebar-container">
                <div class="sidebar" id="sidebar">
                    <div class="search-box">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <label style="margin:0">Find Project</label>
                        </div>
                        <input type="text" id="client-search" placeholder="Domain or Name...">
                        <div class="client-list" id="client-list">
                            <!-- Items injected here -->
                        </div>
                        <div id="project-info" class="switcher-box hidden" style="width: 100%; margin: 0; padding-top: 15px; border-top: 1px solid var(--border); margin-top: auto;">
                            <label style="font-size: 0.6rem; color: var(--orange); font-weight: 800; text-transform: uppercase;">Active Project</label>
                            <div id="active-project-name" style="font-weight: 700; padding: 12px; background: var(--input); border-radius: 14px; border: 1px solid var(--border); font-size: 0.8rem; margin-top: 8px;">None Selected</div>
                        </div>
                    </div>
                </div>
                <div class="sidebar-tab" id="sidebar-tab">Find Project</div>
            </div>

            <div class="main-content">
                <div class="layout">
            <div class="config-card">
                <div class="group">
                    <label>Header Text (e.g. Restaurant Name)</label>
                    <input type="text" id="header-text" placeholder="MENUTECH" oninput="updatePreview()">
                </div>
                <div class="group">
                    <label>Footer Text / Instructions</label>
                    <textarea id="footer-text" placeholder="Thank you for your order!" oninput="updatePreview()"></textarea>
                </div>
                <div class="group">
                    <label>Restaurant Logo</label>
                    <div class="logo-drop-zone" id="logo-drop-zone">
                        <img id="logo-preview-img" class="hidden">
                        <div id="logo-placeholder">
                            <p>Upload Logo</p>
                            <span style="font-size:0.7rem; color:var(--text-dim)">Click or drag image</span>
                        </div>
                        <input type="file" id="logo-file-input" class="hidden" accept="image/*">
                    </div>
                </div>
                <div class="group">
                    <label class="toggle-group">
                        <div class="toggle active" id="logo-toggle" onclick="this.classList.toggle('active'); updatePreview()"></div>
                        <span>Show Logo on Ticket</span>
                    </label>
                </div>
                <button class="btn-save" id="btn-save">Save Configuration</button>
            </div>

            <div class="preview-pane">
                <p style="font-weight: 800; font-size: 0.7rem; color: #666; margin-bottom: 15px; text-transform: uppercase;">Real-time Preview (80mm)</p>
                <div class="ticket-preview">
                    <div id="prev-logo" style="margin-bottom: 10px;"><img src="https://menutech.services/assets/img/logomt.png" height="30" style="filter: grayscale(1) contrast(2);"></div>
                    <div class="preview-header" id="prev-header">MENUTECH</div>
                    <div>ORDER TICKET</div>
                    <div class="preview-sep"></div>
                    <div class="preview-body">
                        <div class="preview-row"><span>Order ID:</span> <span>#A1B2C3D4</span></div>
                        <div class="preview-row"><span>Date:</span> <span id="prev-date"></span></div>
                        <div class="preview-sep"></div>
                        <div style="font-weight: bold; margin-bottom: 5px;">ITEMS:</div>
                        <div class="preview-row"><span>1x Pepperoni Pizza</span> <span>$14.50</span></div>
                        <div class="preview-row"><span>2x Coca Cola</span> <span>$5.00</span></div>
                        <div class="preview-sep"></div>
                        <div class="preview-row" style="font-weight: bold; font-size: 16px;"><span>TOTAL</span> <span>$19.50</span></div>
                    </div>
                    <div class="preview-sep"></div>
                    <div class="preview-footer" id="prev-footer"></div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { MT_CONFIG } from './config.js';
        import { supabase as sb } from './supabase.js';

        let user = null, userRole = null, activeOwnerId = null, activeDomain = null;

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('div');
            icon.innerHTML = type === 'success' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:20px;height:20px;"><polyline points="20 6 9 17 4 12"/></svg>' : type === 'error' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:20px;height:20px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:20px;height:20px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
            const msg = document.createElement('div');
            msg.textContent = message;
            toast.appendChild(icon); toast.appendChild(msg); container.appendChild(toast);
            setTimeout(() => toast.remove(), 6000);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            initEvents();
            checkSession();

            document.getElementById('prev-date').textContent = new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('btn-save').onclick = saveConfig;
        });

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = 'index.html'; return; }
            user = session.user;

            const { data: profile, error: pError } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if (pError || !profile) {
                userRole = 'OWNER'; activeOwnerId = user.id; showApp(null); return;
            }

            userRole = (profile.role || 'OWNER').toUpperCase();
            const allowedRoles = ['ADMIN', 'DEVELOPER', 'OWNER', 'CS', 'ADMINCS'];
            if (!allowedRoles.includes(userRole)) {
                location.href = "index.html";
                return;
            }

            if (['ADMIN', 'DEVELOPER', 'CS', 'ADMINCS'].includes(userRole)) {
                const sidebarContainer = document.getElementById('sidebar-container');
                sidebarContainer.classList.remove('hidden');
                sidebarContainer.classList.add('collapsed');

                await setupContextSwitcher();
                if (!activeOwnerId) {
                    activeOwnerId = user.id;
                    activeDomain = profile.domain;
                    document.getElementById('view-domain-title').textContent = activeDomain || "Admin Workspace";
                }
                showApp(profile);
            } else {
                activeOwnerId = user.id;
                activeDomain = profile.domain;
                showApp(profile);
            }
        }

        let allOwners = [];
        async function setupContextSwitcher() {
            const search = document.getElementById('client-search');
            const privilegedRoles = ['ADMIN', 'DEVELOPER', 'CS', 'ADMINCS'];
            if (privilegedRoles.includes(userRole)) {
                const { data } = await sb.from('profiles').select('*');
                allOwners = data || [];
            } else {
                const { data: access } = await sb.from('developer_access').select('owner_id').eq('developer_id', user.id);
                const ids = (access || []).map(a => a.owner_id);
                const { data } = await sb.from('profiles').select('*').in('id', ids);
                allOwners = data || [];
            }
            renderOwners(allOwners);
            search.oninput = () => {
                const term = search.value.toLowerCase();
                const filtered = allOwners.filter(o => (o.username || '').toLowerCase().includes(term) || (o.domain || '').toLowerCase().includes(term));
                renderOwners(filtered);
            };
            const passedId = sessionStorage.getItem('mt_edit_owner_id');
            if (passedId) { sessionStorage.removeItem('mt_edit_owner_id'); window.switchContext(passedId); }
        }

        function renderOwners(owners) {
            const list = document.getElementById('client-list');
            list.innerHTML = owners.map(o => `<div class="client-item ${activeOwnerId === o.id ? 'active' : ''}" onclick="switchContext('${o.id}')"><span class="name">${o.username || 'User'}</span><span class="domain">${o.domain || (o.username ? '' : o.id.substring(0,8))}</span></div>`).join('');
        }

        window.switchContext = (ownerId) => {
            const owner = allOwners.find(o => o.id === ownerId);
            if (!owner) return;
            activeOwnerId = ownerId; activeDomain = owner.domain;
            document.getElementById('view-domain-title').textContent = activeDomain || "No Domain Set";
            document.getElementById('active-project-name').textContent = owner.username || owner.email;
            document.getElementById('project-info').classList.remove('hidden');
            renderOwners(allOwners);
            loadConfig();
        }

        async function showApp(profile) {
            const main = document.getElementById('main-app');
            const nav = document.getElementById('top-nav');
            const pill = document.getElementById('user-display-pill');

            if (profile) {
                document.getElementById('user-name').textContent = profile.username || user.email.split('@')[0];
                document.getElementById('user-role-label').textContent = profile.role || 'User';
                if (profile.role === 'admin') pill.classList.add('admin-glow');
                else if (profile.role === 'developer') pill.classList.add('dev-glow');
                else pill.classList.add('owner-glow');
            }

            if (main) main.classList.remove('hidden');
            if (nav) nav.classList.remove('hidden');

            if (activeOwnerId) loadConfig();
        }

        async function loadConfig() {
            const { data, error } = await sb.from('menutech_tickets').select('*').eq('user_id', activeOwnerId).maybeSingle();

            // Reset to defaults
            document.getElementById('header-text').value = "MENUTECH";
            document.getElementById('footer-text').value = "";
            document.getElementById('logo-toggle').classList.add('active');
            document.getElementById('logo-preview-img').src = "";
            document.getElementById('logo-preview-img').classList.add('hidden');
            document.getElementById('logo-placeholder').classList.remove('hidden');

            if (data && data.config) {
                document.getElementById('header-text').value = data.config.header_text || "MENUTECH";
                document.getElementById('footer-text').value = data.config.footer_text || "";
                if (data.config.show_logo === false) document.getElementById('logo-toggle').classList.remove('active');

                if (data.config.logo_url) {
                    const img = document.getElementById('logo-preview-img');
                    img.src = data.config.logo_url;
                    img.classList.remove('hidden');
                    document.getElementById('logo-placeholder').classList.add('hidden');
                }
            }
            updatePreview();
        }

        window.updatePreview = () => {
            document.getElementById('prev-header').textContent = document.getElementById('header-text').value || "MENUTECH";
            document.getElementById('prev-footer').textContent = document.getElementById('footer-text').value || "";

            const showLogo = document.getElementById('logo-toggle').classList.contains('active');
            const logoUrl = document.getElementById('logo-preview-img').src;
            const prevLogo = document.getElementById('prev-logo');

            if (showLogo) {
                prevLogo.style.display = 'block';
                prevLogo.querySelector('img').src = (logoUrl && !logoUrl.includes('tickets.html')) ? logoUrl : 'https://menutech.services/assets/img/logomt.png';
            } else {
                prevLogo.style.display = 'none';
            }
        }

        async function saveConfig() {
            const btn = document.getElementById('btn-save');
            btn.textContent = "Saving...";
            btn.disabled = true;

            const logoUrl = document.getElementById('logo-preview-img').src;

            const config = {
                header_text: document.getElementById('header-text').value,
                footer_text: document.getElementById('footer-text').value,
                show_logo: document.getElementById('logo-toggle').classList.contains('active'),
                logo_url: (logoUrl && !logoUrl.includes('tickets.html')) ? logoUrl : null
            };

            const { error } = await sb.from('menutech_tickets').upsert({
                user_id: activeOwnerId,
                domain: activeDomain || null,
                config: config,
                updated_at: new Date().toISOString()
            });

            if (error) showToast("Error saving config: " + error.message, "error");
            else showToast("Configuration saved successfully!");

            btn.textContent = "Save Configuration";
            btn.disabled = false;
        }

        function initTheme() {
            const toggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            toggle.onclick = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); };
        }

        function initEvents() {
            document.getElementById('sidebar-tab').onclick = () => document.getElementById('sidebar-container').classList.toggle('collapsed');
            const pill = document.getElementById('user-display-pill');
            pill.onclick = (e) => { e.stopPropagation(); pill.classList.toggle('active'); };
            document.addEventListener('click', () => pill.classList.remove('active'));
            window.logout = async () => { await sb.auth.signOut(); location.href = "index.html"; };

            // Logo Upload Events
            const dz = document.getElementById('logo-drop-zone'), fi = document.getElementById('logo-file-input');
            dz.onclick = () => fi.click();
            fi.onchange = () => { if(fi.files.length) handleLogoUpload(fi.files[0]); };
            dz.ondragover = e => { e.preventDefault(); dz.style.borderColor = "var(--orange)"; };
            ['dragleave', 'dragend'].forEach(t => dz.addEventListener(t, () => dz.style.borderColor = "var(--border)"));
            dz.ondrop = e => { e.preventDefault(); dz.style.borderColor = "var(--border)"; if(e.dataTransfer.files.length) handleLogoUpload(e.dataTransfer.files[0]); };
        }

        async function handleLogoUpload(file) {
            const placeholder = document.getElementById('logo-placeholder');
            placeholder.innerHTML = '<div class="loader"></div>';

            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', MT_CONFIG.CLOUDINARY.UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${MT_CONFIG.CLOUDINARY.CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                const d = await res.json();
                const img = document.getElementById('logo-preview-img');
                img.src = d.secure_url;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
                updatePreview();
            } catch (e) {
                console.error("Upload error", e);
                showToast("Error uploading logo", "error");
            } finally {
                placeholder.innerHTML = '<p>Upload Logo</p><span style="font-size:0.7rem; color:var(--text-dim)">Click or drag image</span>';
            }
        }
    </script>
</body>
</html>
