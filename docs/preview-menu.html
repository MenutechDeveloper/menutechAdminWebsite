<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Menu | Menutech</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">
    <script src="./menutechUI.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fcfcfc; }
        #loader {
            position: fixed; inset: 0; background: #fff; display: flex;
            align-items: center; justify-content: center; z-index: 10000;
            font-family: sans-serif; color: #ff9533; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loader">Loading Preview...</div>
    <div id="menu-container"></div>

    <script type="module">
        import { supabase as sb } from './supabase.js';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('user');

            if (!userId) {
                document.getElementById('loader').textContent = "Error: No user ID provided.";
                return;
            }

            const { data, error } = await sb.from('profiles').select('domain').eq('id', userId).single();

            if (error || !data) {
                document.getElementById('loader').textContent = "Error: Could not find user domain.";
                return;
            }

            const container = document.getElementById('menu-container');
            const menuElement = document.createElement('menutech-platform-orders');
            menuElement.setAttribute('domain', data.domain);
            container.appendChild(menuElement);

            // Hide loader after a short delay to allow component to start loading
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }, 1500);
        }

        init();
    </script>
</body>
</html>
