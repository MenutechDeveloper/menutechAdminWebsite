<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Admin | Menutech</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">
<link rel="shortcut icon" href="https://menutech.services/assets/img/logomt.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --success: #059669;
            --error: #dc2626;
            --dev: #8b5cf6;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 72px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .dashboard-layout { display: flex; min-height: calc(100vh - 160px); gap: 40px; }

        /* Unified Sidebar Container */
        .sidebar-container {
            position: fixed; left: 0; top: 120px; z-index: 6000; pointer-events: none; display: flex; align-items: flex-start;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-container > * { pointer-events: auto; }
        .sidebar-container.collapsed { transform: translateX(-340px) !important; }

        .sidebar { width: 340px; height: 600px; display: flex; flex-direction: column; gap: 20px; }
        .main-content { flex: 1; min-width: 0; }

        .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 24px; position: relative; cursor: default; transition: opacity 0.3s; user-select: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.15); height: 100%; display: flex; flex-direction: column; }
        .search-box label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 15px; margin-left: 5px; pointer-events: none; }
        .search-box input { width: 100%; margin-bottom: 15px; border-radius: 16px; padding: 14px; background: var(--input); border: 1px solid var(--border); color: var(--text); }

        .client-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .client-list::-webkit-scrollbar { width: 4px; }
        .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .client-item { padding: 14px 18px; border-radius: 16px; background: var(--input); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .client-item:hover { border-color: var(--orange); }
        .client-item.active { border-color: var(--orange); background: rgba(255,149,51,0.08); }
        .client-item .name { font-weight: 700; font-size: 0.85rem; display: block; }
        .client-item .domain { font-size: 0.7rem; color: var(--text-dim); }

        .sidebar-tab {
            width: 45px; height: 160px; background: var(--orange); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; cursor: pointer; writing-mode: vertical-lr; text-orientation: mixed; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; box-shadow: 10px 0 30px rgba(255, 149, 51, 0.2); transition: 0.4s; margin-top: 40px; position: relative;
        }
        .sidebar-tab:hover { width: 55px; padding-left: 10px; }

        .component-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .component-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; }

        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        /* Premium User Pill */
        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto; min-width: 220px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.15); }

        #user-display-pill.admin-glow {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.admin-glow #user-name, #user-display-pill.admin-glow #user-role-label { color: #3e2b14 !important; }

        #user-display-pill.dev-glow {
            background: linear-gradient(135deg, #70706F 0%, #E9E9E7 20%, #70706F 40%, #E9E9E7 60%, #70706F 80%, #E9E9E7 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.dev-glow #user-name, #user-display-pill.dev-glow #user-role-label { color: #1e293b !important; }

        #user-display-pill.owner-glow {
            background: #000;
            background-image: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%, rgba(255,255,255,0.1) 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.owner-glow #user-name, #user-display-pill.owner-glow #user-role-label { color: #fff !important; }

        #user-display-pill #user-name, #user-display-pill #user-role-label { color: var(--text); transition: color 0.3s; }

        @keyframes foil-shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.85rem; font-family: 'Outfit', sans-serif; }
        #user-role-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .pill-menu {
            position: absolute; top: calc(100% + 12px); right: 0; background: var(--card) !important; border: 1px solid var(--border);
            border-radius: 24px; padding: 12px; min-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000;
            animation: none !important;
        }
        #user-display-pill.active .pill-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .pill-menu-item {
            padding: 12px 18px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text);
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .pill-menu-item:hover { background: rgba(255, 149, 51, 0.1); color: var(--orange); }
        .pill-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .theme-switch {
            width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); pointer-events: auto; }
        .theme-switch:hover { transform: translateY(-2px); border-color: var(--orange); }

        .theme-switch svg { width: 24px; height: 24px; transition: 0.4s; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; pointer-events: auto; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); filter: brightness(1.1); }
        .btn-copy {
            background: #fff5eb;
            border: 1px solid #ffd8b0;
            color: var(--orange);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        .btn-copy:hover { background: var(--orange); color: #fff; }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 20000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; max-width: 440px; padding: 18px 24px; border-radius: 24px; background: #1c1f26; border: 1px solid var(--border); color: #fff; font-size: 0.9rem; font-weight: 500; box-shadow: 0 12px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), toastFadeOut 0.5s 5.5s forwards; line-height: 1.4; }
        .toast.success { border-left: 6px solid var(--success); }
        .toast.error { border-left: 6px solid var(--error); }
        .toast.warning { border-left: 6px solid var(--orange); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastFadeOut { from { opacity: 1; } to { opacity: 0; } }

        .loader { border: 3px solid rgba(255, 149, 51, 0.1); width: 28px; height: 28px; border-radius: 50%; border-left-color: var(--orange); animation: rotate 1s linear infinite; margin: 0 auto; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* Floating Footer */
        #floating-footer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            padding: 16px 32px; border-radius: 30px; border: 1.5px solid var(--border);
            display: flex; gap: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 7000; animation: footerSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        body.dark-mode #floating-footer { background: rgba(28, 31, 38, 0.8); }
        @keyframes footerSlideUp { from { bottom: -100px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        .btn-footer {
            padding: 14px 28px; border-radius: 18px; font-weight: 800; font-size: 0.85rem;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; border: none; letter-spacing: 1px;
        }
        .btn-save-all { background: var(--orange); color: #fff; box-shadow: 0 8px 20px rgba(255,149,51,0.3); }
        .btn-save-all:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255,149,51,0.4); }
        .btn-preview { background: var(--input); color: var(--text); border: 1px solid var(--border); }
        .btn-preview:hover { background: var(--border); transform: translateY(-3px); }

        /* Menu Specific Styles */
        .cover-section {
            width: 100%; height: 200px; border-radius: 36px; overflow: hidden; background: var(--input);
            border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; margin-bottom: 40px; transition: 0.3s;
        }
        .cover-section:hover, .cover-section.drag-over { border-color: var(--orange); background: rgba(255,149,51,0.05); }
        .cover-section img, .cover-section video { width: 100%; height: 100%; object-fit: cover; }
        .cover-section .placeholder { text-align: center; color: var(--text-dim); }
        .cover-section .placeholder svg { width: 48px; height: 48px; margin-bottom: 10px; opacity: 0.5; }

        .category-card {
            background: var(--card); border: 1.5px solid var(--border); border-radius: 24px;
            padding: 24px; margin-bottom: 24px; transition: 0.3s; position: relative;
        }
        .category-header { display: flex; align-items: center; gap: 20px; }
        .category-drag-img {
            width: 80px; height: 80px; border-radius: 16px; background: var(--input);
            border: 1.5px dashed var(--border); cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .category-drag-img img { width: 100%; height: 100%; object-fit: cover; }
        .category-drag-img.drag-over, .dish-img.drag-over { border-color: var(--orange); background: rgba(255,149,51,0.05); }
        .category-info { flex: 1; }
        .category-info input {
            width: 100%; background: transparent; border: none; font-family: inherit;
            color: var(--text); margin-bottom: 5px;
        }
        .category-info .cat-title { font-size: 1.1rem; font-weight: 700; }
        .category-info .cat-desc { font-size: 0.85rem; color: var(--text-dim); }
        .category-actions { display: flex; gap: 15px; color: var(--text-dim); }
        .category-actions svg { width: 20px; height: 20px; cursor: pointer; transition: 0.2s; }
        .category-actions svg:hover { color: var(--orange); transform: scale(1.1); }

        .dishes-container { margin-top: 20px; padding-left: 40px; display: none; }
        .dishes-container.active { display: block; }

        .dish-card {
            background: var(--input); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px;
        }
        .dish-img { width: 60px; height: 60px; border-radius: 12px; background: var(--card); overflow: hidden; cursor: pointer; }
        .dish-img img { width: 100%; height: 100%; object-fit: cover; }
        .dish-info { flex: 1; }
        .dish-price { font-weight: 700; color: var(--orange); }

        .btn-add-main {
            width: 100%; padding: 18px; border-radius: 20px; border: 2px dashed var(--border);
            background: transparent; color: var(--text-dim); font-weight: 700; cursor: pointer;
            transition: 0.3s; margin: 20px 0;
        }
        #btn-add-cat-bottom { display: none; }
        #btn-add-cat-bottom.visible { display: block; }
        .btn-add-main:hover { border-color: var(--orange); color: var(--orange); background: rgba(255,149,51,0.02); }

        .btn-add-dish-bottom { display: none; }
        .btn-add-dish-bottom.visible { display: block; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 24px;
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card {
            background: var(--card); width: 100%; max-width: 600px; border-radius: 32px;
            padding: 40px; border: 1.5px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative; animation: modalSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-close { position: absolute; top: 25px; right: 25px; cursor: pointer; color: var(--text-dim); border: none; background: none; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <div id="top-nav" class="hidden">
        <div><button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-switch" id="theme-toggle">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div id="user-display-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px; height:20px; color: inherit;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div class="pill-info">
                    <div id="user-name">&nbsp;</div>
                    <div id="user-role-label">&nbsp;</div>
                </div>
                <div class="pill-menu">
                    <a href="index.html" class="pill-menu-item">Home</a>
                    <div class="pill-menu-item danger" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div id="floating-footer" class="hidden">
        <button class="btn-footer btn-save-all" onclick="saveChanges()">Save Changes</button>
        <button class="btn-footer btn-preview" onclick="openPreview()">Preview Menu</button>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <img src="https://menutech.services/assets/img/logomt.png" class="logo-main" alt="Menutech Logo">
            <p id="view-domain-title" style="font-weight: 700; color: var(--orange); font-size: 0.85rem; letter-spacing: 1px;"></p>

            <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <label id="header-domain-label" style="font-size: 0.9rem; font-weight: 800; color: var(--orange); text-transform: lowercase;">lasalsitapinchi.com</label>
                <label style="font-size: 0.6rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 10px;">Menu URL Slug</label>
                <div style="display: flex; align-items: center; background: var(--input); padding: 12px 24px; border-radius: 16px; border: 1px solid var(--border); min-width: 400px; justify-content: center; margin-top: 5px;">
                    <span style="font-size: 0.95rem; color: var(--orange); font-weight: 900;">menutech.io/menu.html?n=</span>
                    <input type="text" id="slug-input" style="background:transparent; border:none; color:var(--orange); font-weight:900; font-size:0.95rem; padding:0; outline:none; width: auto; min-width: 50px;" oninput="updateSlug(this.value)">
                </div>
                <div id="subdomain-link" style="margin-top: 10px;"></div>
            </div>
        </header>

        <div class="dashboard-layout">
            <div class="sidebar-container hidden" id="sidebar-container">
                <div class="sidebar" id="sidebar">
                    <div class="search-box">
                        <label>Find Project</label>
                        <input type="text" id="client-search" placeholder="Domain or Name...">
                        <div class="client-list" id="client-list"></div>
                        <div id="project-info" class="switcher-box hidden" style="width: 100%; margin: 0; padding-top: 15px; border-top: 1px solid var(--border); margin-top: auto;">
                            <label>Active Project</label>
                            <div id="active-project-name" style="font-weight: 700; padding: 12px; background: var(--input); border-radius: 14px; border: 1px solid var(--border); font-size: 0.8rem; margin-top: 8px;">None Selected</div>
                        </div>
                    </div>
                </div>
                <div class="sidebar-tab" id="sidebar-tab">Find Project</div>
            </div>

            <div class="main-content">
                <div id="snippet-section" class="hidden" style="display: flex; justify-content: center; margin-bottom: 40px;">
                    <button id="btn-copy-snippet" class="btn-copy" style="width: 100%; max-width: 800px;">COPY MENU CODE</button>
                </div>

                <div id="menu-editor">
                    <div class="component-header">
                        <h2>Menu Design</h2>
                        <div style="display:flex; gap:10px;">
                            <label style="cursor:pointer; padding:10px 20px; border-radius:14px; border:1px solid var(--border); font-size:0.8rem; font-weight:800; transition:0.3s;" id="label-mode1">
                                <input type="radio" name="menu-style" value="mode1" onchange="updateStyle(this.value)" style="display:none"> Mode 1
                            </label>
                            <label style="cursor:pointer; padding:10px 20px; border-radius:14px; border:1px solid var(--border); font-size:0.8rem; font-weight:800; transition:0.3s;" id="label-mode2">
                                <input type="radio" name="menu-style" value="mode2" onchange="updateStyle(this.value)" style="display:none"> Mode 2
                            </label>
                        </div>
                    </div>

                    <div class="component-header"><h2>Menu Cover</h2></div>
                    <div class="cover-section" id="cover-drop-zone">
                        <div class="placeholder" id="cover-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <p>Upload Cover Image or Video (200px height)</p>
                        </div>
                        <input type="file" id="cover-input" class="hidden" accept="image/*,video/*">
                    </div>

                    <div class="component-header">
                        <h2>Categories</h2>
                        <button id="btn-add-cat-top" class="btn-panel-top" style="padding: 8px 16px; font-size: 0.7rem;" onclick="addCategory()">+ Add Category</button>
                    </div>

                    <div id="categories-list"></div>

                    <button id="btn-add-cat-bottom" class="btn-add-main" onclick="addCategory()">+ Add New Category</button>

                    <div class="component-header" style="margin-top: 60px;"><h2>Toppings & Options</h2></div>
                    <div id="toppings-list"></div>
                    <button class="btn-add-main" onclick="addToppingGroup()">+ Add Topping Group</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dish Toppings Modal -->
    <div id="dish-toppings-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeDishToppingsModal()"><svg style="width:24px;height:24px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            <h3>Dish Topping Groups</h3>
            <div id="dish-toppings-list-modal" style="margin-top: 20px;">
                <!-- Topping groups checkboxes -->
            </div>
            <div style="margin-top: 30px; display:flex; gap:15px;">
                <button class="btn-footer btn-save-all" style="flex:1;" onclick="closeDishToppingsModal()">Done</button>
            </div>
        </div>
    </div>

    <!-- Dish Sizes Modal -->
    <div id="sizes-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeSizesModal()"><svg style="width:24px;height:24px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            <h3>Dish Sizes & Prices</h3>
            <div id="sizes-list-modal" style="margin-top: 20px;">
                <!-- Sizes rows -->
            </div>
            <button class="btn-panel-top" style="padding:10px; font-size:0.8rem; margin-top:10px; width:100%" onclick="addSizeRow()">+ Add Size</button>
            <div style="margin-top: 30px; display:flex; gap:15px;">
                <button class="btn-footer btn-save-all" style="flex:1;" onclick="closeSizesModal()">Done</button>
            </div>
        </div>
    </div>

    <!-- Category Visibility Modal -->
    <div id="visibility-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeVisibilityModal()"><svg style="width:24px;height:24px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            <h3>Category Visibility</h3>
            <div style="margin-top: 20px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
                    <div>
                        <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:10px;">Start Date</label>
                        <input type="date" id="vis-start-date" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--input); color:var(--text);">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:10px;">End Date</label>
                        <input type="date" id="vis-end-date" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--input); color:var(--text);">
                    </div>
                </div>
                <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:10px;">Select Days</label>
                <div style="display:flex; flex-wrap:wrap; gap:10px;" id="visibility-days">
                    <!-- Days of week checkboxes -->
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div>
                        <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:10px;">Start Time</label>
                        <input type="time" id="vis-start-time" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--input); color:var(--text);">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.75rem; font-weight:700; color:var(--orange); text-transform:uppercase; margin-bottom:10px;">End Time</label>
                        <input type="time" id="vis-end-time" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--input); color:var(--text);">
                    </div>
                </div>
            </div>
            <div style="margin-top: 30px; display:flex; gap:15px;">
                <button class="btn-footer btn-save-all" style="flex:1;" onclick="saveVisibility()">Apply</button>
                <button class="btn-footer btn-preview" style="flex:1;" onclick="closeVisibilityModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { MT_CONFIG } from './config.js';
        import { supabase as sb } from './supabase.js';

        let user = null, userRole = null, activeOwnerId = null, activeDomain = null;
        let menuData = { cover_url: '', cover_type: 'image', config: { categories: [], toppings: [] } };
        let allOwners = [];

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const msg = document.createElement('div');
            msg.textContent = message;
            toast.appendChild(msg); container.appendChild(toast);
            setTimeout(() => toast.remove(), 6000);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme(); initEvents();
            checkSession();
        });

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = "index.html"; return; }
            user = session.user;
            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if (!profile) { userRole = 'owner'; activeOwnerId = user.id; showApp(null); return; }
            userRole = profile.role;
            if (userRole === 'admin' || userRole === 'developer' || userRole === 'adminCS' || userRole === 'CS') {
                document.getElementById('sidebar-container').classList.remove('hidden');
                document.getElementById('sidebar-container').classList.add('collapsed');
                document.getElementById('snippet-section').classList.remove('hidden');
                await setupContextSwitcher();
            }
            activeOwnerId = user.id; activeDomain = profile.domain;
            showApp(profile);
        }

        async function setupContextSwitcher() {
            const { data } = await sb.from('profiles').select('*');
            allOwners = data || [];
            renderOwners(allOwners);
            document.getElementById('client-search').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                renderOwners(allOwners.filter(o => (o.username||'').toLowerCase().includes(term) || (o.domain||'').toLowerCase().includes(term)));
            };
        }

        function renderOwners(owners) {
            const list = document.getElementById('client-list');
            list.innerHTML = owners.map(o => `<div class="client-item ${activeOwnerId === o.id ? 'active' : ''}" onclick="switchContext('${o.id}')"><span class="name">${o.username || 'User'}</span><span class="domain">${o.domain || o.id.substring(0,8)}</span></div>`).join('');
        }

        window.switchContext = async (ownerId) => {
            const owner = allOwners.find(o => o.id === ownerId);
            if (!owner) return;
            activeOwnerId = ownerId; activeDomain = owner.domain;
            const domainLabel = document.getElementById('header-domain-label');
            if (domainLabel) domainLabel.textContent = activeDomain || "Workspace";
            document.getElementById('view-domain-title').textContent = "";
            document.getElementById('active-project-name').textContent = owner.username || owner.email;
            document.getElementById('project-info').classList.remove('hidden');
            renderOwners(allOwners);
            await loadMenu();
            updateSubdomainLink(owner);
        }

        function updateSubdomainLink(profile) {
            if (!profile) return;
            // Improve slug generation: prioritize domain, then username
            let defaultSlug = '';
            if (profile.domain && !profile.domain.includes('menutech')) {
                // Remove .com, .io etc and handle common separators
                defaultSlug = profile.domain.split('.')[0];
            } else {
                defaultSlug = profile.username || 'restaurant';
            }

            const slug = menuData.slug || defaultSlug.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            menuData.slug = slug;
            document.getElementById('slug-input').value = slug;
            const link = `menutech.io/menu.html?n=${slug}`;
            document.getElementById('subdomain-link').innerHTML = `<a href="https://${link}" target="_blank" style="color:var(--orange); text-decoration:none; font-weight:800;">Go to Menu</a>`;
        }

        window.updateSlug = (val) => {
            const slug = val.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            menuData.slug = slug;
            const link = `menutech.io/menu.html?n=${slug}`;
            document.getElementById('subdomain-link').innerHTML = `<a href="https://${link}" target="_blank" style="color:var(--orange); text-decoration:none; font-weight:800;">Go to Menu</a>`;
        };

        async function loadMenu() {
            if (!activeOwnerId) return;
            // Clear existing data to prevent bleed-through
            menuData = { cover_url: '', cover_type: 'image', menu_style: 'mode1', config: { categories: [], toppings: [] } };

            const { data } = await sb.from('menutech_menus').select('*').eq('user_id', activeOwnerId).maybeSingle();
            if (data) {
                menuData = data;
                if (!menuData.config) menuData.config = { categories: [], toppings: [] };
                if (!menuData.menu_style) menuData.menu_style = 'mode1';
                // Ensure Topping IDs
                (menuData.config.toppings || []).forEach(tg => {
                    if (!tg.id) tg.id = 'tg-' + Math.random().toString(36).substr(2, 9);
                });
            }
            renderMenuEditor();
        }

        window.updateStyle = (style) => {
            menuData.menu_style = style;
            const l1 = document.getElementById('label-mode1');
            const l2 = document.getElementById('label-mode2');
            if (l1 && l2) {
                l1.style.background = style === 'mode1' ? 'var(--orange)' : 'var(--card)';
                l1.style.color = style === 'mode1' ? '#fff' : 'var(--text-dim)';
                l2.style.background = style === 'mode2' ? 'var(--orange)' : 'var(--card)';
                l2.style.color = style === 'mode2' ? '#fff' : 'var(--text-dim)';
            }
        };

        async function showApp(profile) {
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('top-nav').classList.remove('hidden');
            if (profile) {
                document.getElementById('user-name').textContent = profile.username || user.email.split('@')[0];
                document.getElementById('user-role-label').textContent = profile.role || 'User';
                const domainLabel = document.getElementById('header-domain-label');
                if (domainLabel) domainLabel.textContent = profile.domain || "Workspace";
                document.getElementById('view-domain-title').textContent = "";

                await loadMenu(); // Wait for menu data before updating the link
                updateSubdomainLink(profile);
            } else {
                await loadMenu();
            }
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle').onclick = () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            };
        }

        function initEvents() {
            const topBtn = document.getElementById('btn-add-cat-top');
            const bottomBtn = document.getElementById('btn-add-cat-bottom');
            window.onscroll = () => {
                if (topBtn) {
                    const rect = topBtn.getBoundingClientRect();
                    if (rect.bottom < 0) bottomBtn.classList.add('visible');
                    else bottomBtn.classList.remove('visible');
                }

                // Dynamic Dish Buttons
                document.querySelectorAll('.btn-add-dish-top').forEach(tBtn => {
                    const cIdx = tBtn.dataset.catIdx;
                    const bBtn = document.getElementById(`btn-add-dish-bottom-${cIdx}`);
                    if (bBtn) {
                        const rect = tBtn.getBoundingClientRect();
                        if (rect.bottom < 0) bBtn.classList.add('visible');
                        else bBtn.classList.remove('visible');
                    }
                });
            };

            document.getElementById('sidebar-tab').onclick = () => document.getElementById('sidebar-container').classList.toggle('collapsed');
            const pill = document.getElementById('user-display-pill');
            pill.onclick = (e) => { e.stopPropagation(); pill.classList.toggle('active'); };
            document.addEventListener('click', () => pill.classList.remove('active'));
            window.logout = async () => { await sb.auth.signOut(); location.href = "index.html"; };
            document.getElementById('btn-copy-snippet').onclick = () => {
                if (!activeDomain) return showToast("Assign a domain first.", "warning");
                const snippet = `<!-- Menutech Menu -->\n<script src="https://menutech.io/menutechUI.js"><\/script>\n<menutech-platform-orders domain="${activeDomain}"></menutech-platform-orders>`;
                navigator.clipboard.writeText(snippet).then(() => {
                    const btn = document.getElementById('btn-copy-snippet');
                    btn.textContent = "COPIED!";
                    setTimeout(() => btn.textContent = "COPY MENU CODE", 2000);
                });
            };
        }

        function renderMenuEditor() {
            updateStyle(menuData.menu_style || 'mode1');
            renderCover();
            renderCategories();
            renderToppings();
            document.getElementById('floating-footer').classList.remove('hidden');
            setTimeout(setupDragZones, 500);
        }

        function setupDragZones() {
            const setup = (selector, onDrop) => {
                const els = document.querySelectorAll(selector);
                els.forEach(el => {
                    el.ondragover = (e) => { e.preventDefault(); el.classList.add('drag-over'); };
                    el.ondragleave = () => el.classList.remove('drag-over');
                    el.ondrop = (e) => {
                        e.preventDefault();
                        el.classList.remove('drag-over');
                        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                            onDrop(e.dataTransfer.files[0], el);
                        }
                    };
                });
            };

            setup('.cover-section', (file) => uploadMedia(file, 'cover'));
            setup('.category-drag-img', (file, el) => {
                const parts = el.id.split('-');
                const idx = parseInt(parts[parts.length - 1]);
                uploadMedia(file, 'category', idx);
            });
            setup('.dish-img', (file, el) => {
                const input = el.querySelector('input[type="file"]');
                if (input) {
                    const idParts = input.id.split('-');
                    const dIdx = parseInt(idParts.pop());
                    const cIdx = parseInt(idParts.pop());
                    uploadMedia(file, 'dish', [cIdx, dIdx]);
                }
            });
        }

        function renderDishes(catIdx) {
            const cat = menuData.config.categories[catIdx];
            const list = document.getElementById(`dishes-list-${catIdx}`);
            if (!cat.dishes) cat.dishes = [];
            list.innerHTML = cat.dishes.map((dish, i) => {
                const toppingCount = dish.toppings ? dish.toppings.length : 0;
                return `
                <div class="dish-card">
                    <div class="dish-img" onclick="document.getElementById('dish-img-${catIdx}-${i}').click()">
                        ${dish.image ? `<img src="${dish.image}">` : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px; opacity:0.3; margin:20px"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="21 15 16 10 5 21"/></svg>'}
                        <input type="file" id="dish-img-${catIdx}-${i}" class="hidden" onchange="uploadMedia(this.files[0], 'dish', [${catIdx}, ${i}])">
                    </div>
                    <div class="dish-info">
                        <input type="text" style="font-weight:700; width:100%" value="${dish.name || ''}" placeholder="Dish Name" onchange="updateDish(${catIdx}, ${i}, 'name', this.value)">
                        <input type="text" style="font-size:0.8rem; color:var(--text-dim); width:100%" value="${dish.description || ''}" placeholder="Description" onchange="updateDish(${catIdx}, ${i}, 'description', this.value)">
                        <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                            <span style="font-size:0.8rem; font-weight:700">Price:</span>
                            <input type="number" style="width:80px; font-weight:700; color:var(--orange)" value="${dish.price || 0}" step="0.01" onchange="updateDish(${catIdx}, ${i}, 'price', this.value)">
                        </div>
                    </div>
                    <div class="category-actions">
                        <div style="position:relative">
                            <svg title="Toppings" onclick="openDishToppings(${catIdx}, ${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                            ${toppingCount > 0 ? `<span style="position:absolute; top:-5px; right:-5px; background:var(--orange); color:#000; font-size:10px; width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800">${toppingCount}</span>` : ''}
                        </div>
                        <svg title="Sizes" onclick="openSizes(${catIdx}, ${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9h16M4 15h16"/></svg>
                        <svg title="Delete" onclick="deleteDish(${catIdx}, ${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </div>
                </div>
            `;}).join('');
            setTimeout(setupDragZones, 100);
        }

        window.addDish = (catIdx) => {
            if (!menuData.config.categories[catIdx].dishes) menuData.config.categories[catIdx].dishes = [];
            menuData.config.categories[catIdx].dishes.push({ name: '', description: '', price: 0, image: '', sizes: [], toppings: [] });
            renderDishes(catIdx);
        };
        window.updateDish = (cIdx, dIdx, field, val) => { menuData.config.categories[cIdx].dishes[dIdx][field] = val; };
        window.deleteDish = (cIdx, dIdx) => { if(confirm('Delete dish?')) { menuData.config.categories[cIdx].dishes.splice(dIdx,1); renderDishes(cIdx); } };

        let currentSizeDish = null;
        window.openSizes = (cIdx, dIdx) => {
            currentSizeDish = [cIdx, dIdx];
            renderSizesModal();
            document.getElementById('sizes-modal').classList.add('active');
        };
        window.closeSizesModal = () => document.getElementById('sizes-modal').classList.remove('active');
        function renderSizesModal() {
            const [cIdx, dIdx] = currentSizeDish;
            const dish = menuData.config.categories[cIdx].dishes[dIdx];
            if (!dish.sizes) dish.sizes = [];
            const list = document.getElementById('sizes-list-modal');
            list.innerHTML = dish.sizes.map((s, i) => `
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" style="flex:2; padding:10px; border-radius:10px; border:1px solid var(--border)" value="${s.name || ''}" placeholder="Size (e.g. Small)" onchange="updateSize(${i}, 'name', this.value)">
                    <input type="number" style="flex:1; padding:10px; border-radius:10px; border:1px solid var(--border)" value="${s.price || 0}" step="0.01" onchange="updateSize(${i}, 'price', parseFloat(this.value))">
                    <button style="background:none; border:none; color:var(--error)" onclick="deleteSize(${i})">✕</button>
                </div>
            `).join('');
        }
        window.addSizeRow = () => {
            const [cIdx, dIdx] = currentSizeDish;
            menuData.config.categories[cIdx].dishes[dIdx].sizes.push({ name: '', price: 0 });
            renderSizesModal();
        };
        window.updateSize = (i, field, val) => {
            const [cIdx, dIdx] = currentSizeDish;
            menuData.config.categories[cIdx].dishes[dIdx].sizes[i][field] = val;
        };
        window.deleteSize = (i) => {
            const [cIdx, dIdx] = currentSizeDish;
            menuData.config.categories[cIdx].dishes[dIdx].sizes.splice(i, 1);
            renderSizesModal();
        };

        let currentDishToppings = null;
        window.openDishToppings = (cIdx, dIdx) => {
            currentDishToppings = [cIdx, dIdx];
            renderDishToppingsModal();
            document.getElementById('dish-toppings-modal').classList.add('active');
        };
        window.closeDishToppingsModal = () => document.getElementById('dish-toppings-modal').classList.remove('active');
        function renderDishToppingsModal() {
            const [cIdx, dIdx] = currentDishToppings;
            const dish = menuData.config.categories[cIdx].dishes[dIdx];
            if (!dish.toppings) dish.toppings = [];
            const list = document.getElementById('dish-toppings-list-modal');
            const groups = menuData.config.toppings || [];
            if (groups.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim); font-size:0.85rem">No topping groups created yet. Create them at the bottom of the page.</p>';
                return;
            }
            list.innerHTML = groups.map(tg => `
                <label style="display:flex; align-items:center; gap:12px; background:var(--input); padding:14px; border-radius:14px; border:1px solid var(--border); margin-bottom:10px; cursor:pointer;">
                    <input type="checkbox" value="${tg.id}" ${dish.toppings.includes(tg.id) ? 'checked' : ''} onchange="toggleDishTopping('${tg.id}', this.checked)">
                    <span style="font-weight:700; font-size:0.9rem">${tg.name || 'Unnamed Group'}</span>
                </label>
            `).join('');
        }
        window.toggleDishTopping = (tgId, checked) => {
            const [cIdx, dIdx] = currentDishToppings;
            const dish = menuData.config.categories[cIdx].dishes[dIdx];
            if (!dish.toppings) dish.toppings = [];
            if (checked) {
                if (!dish.toppings.includes(tgId)) dish.toppings.push(tgId);
            } else {
                dish.toppings = dish.toppings.filter(id => id !== tgId);
            }
            renderDishes(cIdx);
        };

        function renderToppings() {
            const list = document.getElementById('toppings-list');
            if (!menuData.config.toppings) menuData.config.toppings = [];
            list.innerHTML = menuData.config.toppings.map((group, i) => `
                <div class="category-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <input type="text" style="font-weight:700; font-size:1.1rem; width:70%" value="${group.name || ''}" placeholder="Group Name (e.g. Salsas)" onchange="updateToppingGroup(${i}, 'name', this.value)">
                        <div class="category-actions">
                            <svg title="Delete Group" onclick="deleteToppingGroup(${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </div>
                    </div>
                    <div style="display:flex; gap:20px; margin-bottom:15px;">
                        <label><input type="radio" name="topping-type-${i}" value="optional" ${group.type==='optional'?'checked':''} onchange="updateToppingGroup(${i}, 'type', 'optional')"> Optional</label>
                        <label><input type="radio" name="topping-type-${i}" value="mandatory" ${group.type==='mandatory'?'checked':''} onchange="updateToppingGroup(${i}, 'type', 'mandatory')"> Mandatory</label>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:15px;">
                        <div><label style="font-size:0.7rem; font-weight:700">Min</label><input type="number" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border)" value="${group.min || 0}" onchange="updateToppingGroup(${i}, 'min', parseInt(this.value))"></div>
                        <div><label style="font-size:0.7rem; font-weight:700">Max</label><input type="number" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border)" value="${group.max || 1}" onchange="updateToppingGroup(${i}, 'max', parseInt(this.value))"></div>
                    </div>
                    <div id="toppings-items-${i}">
                        ${(group.items || []).map((it, j) => `
                            <div style="display:flex; gap:10px; margin-bottom:10px;">
                                <input type="text" style="flex:2; padding:8px; border-radius:8px; border:1px solid var(--border)" value="${it.name || ''}" placeholder="Option Name" onchange="updateToppingItem(${i}, ${j}, 'name', this.value)">
                                <input type="number" style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--border)" value="${it.price || 0}" step="0.01" onchange="updateToppingItem(${i}, ${j}, 'price', parseFloat(this.value))">
                                <button style="background:none; border:none; color:var(--error)" onclick="deleteToppingItem(${i}, ${j})">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn-panel-top" style="padding:5px 12px; font-size:0.7rem; margin-top:10px;" onclick="addToppingItem(${i})">+ Add Option</button>
                </div>
            `).join('');
        }

        window.addToppingGroup = () => {
            const id = 'tg-' + Math.random().toString(36).substr(2, 9);
            menuData.config.toppings.push({ id, name: '', type: 'optional', min: 0, max: 1, items: [] });
            renderToppings();
        };
        window.updateToppingGroup = (i, field, val) => { menuData.config.toppings[i][field] = val; };
        window.deleteToppingGroup = (i) => { if(confirm('Delete topping group?')) { menuData.config.toppings.splice(i,1); renderToppings(); } };
        window.addToppingItem = (i) => { menuData.config.toppings[i].items.push({ name: '', price: 0 }); renderToppings(); };
        window.updateToppingItem = (i, j, field, val) => { menuData.config.toppings[i].items[j][field] = val; };
        window.deleteToppingItem = (i, j) => { menuData.config.toppings[i].items.splice(j,1); renderToppings(); };

        function renderCover() {
            const zone = document.getElementById('cover-drop-zone');
            const placeholder = document.getElementById('cover-placeholder');
            if (menuData.cover_url) {
                placeholder.classList.add('hidden');
                zone.innerHTML = menuData.cover_type === 'video'
                    ? `<video src="${menuData.cover_url}" autoplay loop muted></video>`
                    : `<img src="${menuData.cover_url}">`;
            } else {
                placeholder.classList.remove('hidden');
            }
            zone.onclick = () => document.getElementById('cover-input').click();
            document.getElementById('cover-input').onchange = (e) => uploadMedia(e.target.files[0], 'cover');
        }

        function renderCategories() {
            const list = document.getElementById('categories-list');
            list.innerHTML = menuData.config.categories.map((cat, i) => `
                <div class="category-card" id="cat-card-${i}">
                    <div class="category-header">
                        <div class="category-drag-img" id="cat-img-zone-${i}" onclick="document.getElementById('cat-img-${i}').click()">
                            ${cat.image ? `<img src="${cat.image}">` : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px; opacity:0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="21 15 16 10 5 21"/></svg>'}
                            <input type="file" id="cat-img-${i}" class="hidden" onchange="uploadMedia(this.files[0], 'category', ${i})">
                        </div>
                        <div class="category-info">
                            <input type="text" class="cat-title" value="${cat.name || ''}" placeholder="Category Name (e.g. Breakfast)" onchange="updateCat(${i}, 'name', this.value)">
                            <input type="text" class="cat-desc" value="${cat.description || ''}" placeholder="Short description..." onchange="updateCat(${i}, 'description', this.value)">
                        </div>
                        <div class="category-actions">
                            <svg title="Visibility" onclick="openVisibility(${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <svg title="Duplicate" onclick="duplicateCat(${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            <svg title="Delete" onclick="deleteCat(${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            <svg title="Toggle Dishes" onclick="toggleDishes(${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                    <div class="dishes-container" id="dishes-${i}">
                        <button class="btn-panel-top btn-add-dish-top" data-cat-idx="${i}" style="padding: 6px 12px; font-size: 0.65rem; margin-bottom: 15px;" onclick="addDish(${i})">+ Add Dish</button>
                        <div id="dishes-list-${i}"></div>
                        <button id="btn-add-dish-bottom-${i}" class="btn-add-main btn-add-dish-bottom" style="padding:12px; font-size:0.8rem;" onclick="addDish(${i})">+ Add Dish to ${cat.name || 'Category'}</button>
                    </div>
                </div>
            `).join('');

            // Render dishes for each category
            menuData.config.categories.forEach((cat, i) => renderDishes(i));
            setTimeout(setupDragZones, 100);
        }

        window.addCategory = () => {
            menuData.config.categories.push({ name: '', description: '', image: '', visibility: { days: [0,1,2,3,4,5,6], start: '00:00', end: '23:59', startDate:'', endDate:'' }, dishes: [] });
            renderCategories();
        };
        window.updateCat = (i, field, val) => { menuData.config.categories[i][field] = val; };
        window.deleteCat = (i) => { if(confirm('Delete category?')) { menuData.config.categories.splice(i,1); renderCategories(); } };
        window.duplicateCat = (i) => { const clone = JSON.parse(JSON.stringify(menuData.config.categories[i])); menuData.config.categories.splice(i+1, 0, clone); renderCategories(); };
        window.toggleDishes = (i) => { document.getElementById(`dishes-${i}`).classList.toggle('active'); };

        let currentVisCat = null;
        window.openVisibility = (i) => {
            currentVisCat = i;
            const vis = menuData.config.categories[i].visibility || { days: [0,1,2,3,4,5,6], start: '00:00', end: '23:59', startDate:'', endDate:'' };
            const daysDiv = document.getElementById('visibility-days');
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            daysDiv.innerHTML = dayNames.map((name, idx) => `
                <label style="display:flex; align-items:center; gap:5px; background:var(--input); padding:8px 12px; border-radius:10px; cursor:pointer; font-size:0.8rem;">
                    <input type="checkbox" value="${idx}" ${vis.days.includes(idx) ? 'checked' : ''}> ${name}
                </label>
            `).join('');
            document.getElementById('vis-start-time').value = vis.start || '00:00';
            document.getElementById('vis-end-time').value = vis.end || '23:59';
            document.getElementById('vis-start-date').value = vis.startDate || '';
            document.getElementById('vis-end-date').value = vis.endDate || '';
            document.getElementById('visibility-modal').classList.add('active');
        };
        window.closeVisibilityModal = () => document.getElementById('visibility-modal').classList.remove('active');
        window.saveVisibility = () => {
            const days = Array.from(document.querySelectorAll('#visibility-days input:checked')).map(el => parseInt(el.value));
            menuData.config.categories[currentVisCat].visibility = {
                days,
                start: document.getElementById('vis-start-time').value,
                end: document.getElementById('vis-end-time').value,
                startDate: document.getElementById('vis-start-date').value,
                endDate: document.getElementById('vis-end-date').value
            };
            closeVisibilityModal();
            showToast("Visibility updated");
        };

        async function uploadMedia(file, target, idx) {
            if (!file) return;
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', MT_CONFIG.CLOUDINARY.UPLOAD_PRESET);
            showToast("Uploading...", "warning");
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${MT_CONFIG.CLOUDINARY.CLOUD_NAME}/auto/upload`, { method: 'POST', body: fd });
                const d = await res.json();
                if (target === 'cover') {
                    menuData.cover_url = d.secure_url;
                    menuData.cover_type = d.resource_type === 'video' ? 'video' : 'image';
                    renderCover();
                } else if (target === 'category') {
                    menuData.config.categories[idx].image = d.secure_url;
                    renderCategories();
                    setTimeout(setupDragZones, 500);
                } else if (target === 'dish') {
                    const [cIdx, dIdx] = idx;
                    menuData.config.categories[cIdx].dishes[dIdx].image = d.secure_url;
                    renderDishes(cIdx);
                }
                showToast("Upload complete!");
            } catch (e) { showToast("Upload failed", "error"); }
        }

        window.openPreview = () => {
            const slug = menuData.slug || 'preview';
            const url = `./menu.html?n=${slug}`;
            window.open(url, '_blank');
        };

        window.saveChanges = async () => {
            if (!activeOwnerId) return;
            const btn = document.querySelector('.btn-save-all');
            btn.textContent = "SAVING...";

            // Ensure we have a slug
            if (!menuData.slug) {
                const slugInput = document.getElementById('slug-input');
                menuData.slug = slugInput.value || 'restaurant';
            }

            try {
                const { error } = await sb.from('menutech_menus').upsert({
                    user_id: activeOwnerId,
                    domain: activeDomain || 'undetermined',
                    slug: menuData.slug,
                    menu_style: menuData.menu_style,
                    cover_url: menuData.cover_url,
                    cover_type: menuData.cover_type,
                    config: menuData.config
                }, { onConflict: 'user_id' });
                if (error) throw error;
                showToast("Menu saved successfully!");
            } catch (e) { showToast(e.message, "error"); }
            btn.textContent = "SAVE CHANGES";
        }
    </script>
</body>
</html>
