<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physical Menu Designer | Menutech</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">

    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #f4f4f7;
            --card: #ffffff;
            --text: #1a1c1e;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Top Nav */
        #top-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: white; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; z-index: 1000;
        }

        .btn-panel-top {
            background: var(--orange); color: #fff; border: none;
            padding: 10px 20px; border-radius: 12px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
        }

        /* Main Layout */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            height: calc(100vh - 70px);
            margin-top: 70px;
        }

        /* Sidebars */
        .sidebar {
            background: white; border-right: 1px solid var(--border);
            padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px;
        }
        .sidebar-right { border-left: 1px solid var(--border); border-right: none; }

        h3 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 12px; }

        .tool-item {
            background: #f8fafc; border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: 0.2s;
            margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
        }
        .tool-item:hover { border-color: var(--orange); background: #fffcf9; }

        /* Canvas Area */
        .canvas-area {
            padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
            background: #e2e8f0;
        }

        .page-wrapper {
            position: relative; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .page {
            background: white; position: relative; overflow: hidden;
            width: 8.5in; height: 11in; /* Default Letter */
            transition: background 0.3s;
        }

        /* Element Styles */
        .canvas-element {
            position: absolute; cursor: move; touch-action: none;
            user-select: none; z-index: 10;
        }
        .canvas-element:hover { outline: 2px dashed var(--orange); }
        .canvas-element.selected { outline: 2px solid var(--orange); }

        .delete-btn {
            position: absolute; top: -10px; right: -10px; background: var(--error);
            color: white; border: none; border-radius: 50%; width: 22px; height: 22px;
            cursor: pointer; display: none; font-weight: bold; z-index: 100;
        }
        .canvas-element:hover .delete-btn { display: block; }

        /* Template Specifics */
        .tmpl-dark { background: #121212; color: white; }
        .tmpl-light { background: #fff; color: #333; }
        .tmpl-rustic { background: #fdf6e3; color: #5a3e2b; }

        /* Brush Headers */
        .brush-header {
            font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
            padding: 10px 40px; display: inline-block; position: relative;
            z-index: 1; text-align: center; min-width: 200px;
        }
        .brush-header::after {
            content: ''; position: absolute; inset: 0; z-index: -1;
            mask-image: url('https://menutech.services/assets/img/brush_stroke.png'); /* Placeholder or CSS polygon */
            mask-size: 100% 100%;
            background: var(--brush-color, var(--orange));
            clip-path: polygon(5% 0%, 95% 2%, 100% 50%, 95% 98%, 5% 100%, 0% 50%);
        }

        /* Item Rows */
        .item-row { display: flex; justify-content: space-between; gap: 20px; font-family: 'Lora', serif; font-weight: 700; width: 100%; }
        .item-dots { flex: 1; border-bottom: 2px dotted rgba(0,0,0,0.1); margin-bottom: 5px; }
        .tmpl-dark .item-dots { border-color: rgba(255,255,255,0.2); }

        /* Floating Actions */
        .floating-footer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; padding: 12px 24px; border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; gap: 15px; z-index: 2000;
        }
        .btn-action {
            padding: 12px 24px; border-radius: 25px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.2s; font-size: 0.85rem;
        }
        .btn-save { background: var(--orange); color: white; }
        .btn-pdf { background: var(--success); color: white; }

        /* Context Switcher */
        .context-pill {
            background: #f1f5f9; padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
        }

        /* Image List */
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .image-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .image-thumb:hover { border-color: var(--orange); }

        .hidden { display: none !important; }

        /* Toast */
        #toast {
            position: fixed; top: 90px; right: 24px; padding: 16px 24px;
            border-radius: 12px; background: #1e293b; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 10000;
            transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>

    <div id="toast">Message here</div>

    <nav id="top-nav">
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="btn-panel-top" onclick="location.href='index.html'">Panel</button>
            <div id="project-switcher" class="hidden">
                <select id="context-select" onchange="window.switchContext(this.value)" style="padding: 8px; border-radius: 8px; border: 1px solid var(--border);">
                    <option value="">Loading users...</option>
                </select>
            </div>
        </div>
        <div id="user-pill" style="font-weight: 700; font-size: 0.9rem;">Loading...</div>
    </nav>

    <div class="app-container">
        <!-- Sidebar Left: Elements -->
        <aside class="sidebar">
            <div>
                <h3>Restaurant Assets</h3>
                <div class="tool-item" onclick="addElement('logo')"><span>🖼️</span> Restaurant Logo</div>
                <div class="tool-item" onclick="addElement('name')"><span>🏷️</span> Restaurant Name</div>
                <div class="tool-item" onclick="addElement('contact')"><span>📞</span> Contact Details</div>
            </div>

            <div>
                <h3>Menu Structure</h3>
                <div class="tool-item" style="background: #fff1e6;" onclick="autoFlow()"><span>⚡</span> Auto-Flow All Menu</div>
                <div id="categories-list">
                    <!-- Categories will load here -->
                </div>
            </div>

            <div>
                <h3>Gallery</h3>
                <div class="image-grid" id="gallery">
                    <!-- Images will load here -->
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="canvas-area">
            <div id="designer-canvas">
                <!-- Pages will be rendered here -->
            </div>
            <button class="btn-action" style="background: white; border: 1px solid var(--border); margin-top: 20px;" onclick="addPage()">+ Add Page</button>
        </main>

        <!-- Sidebar Right: Properties -->
        <aside class="sidebar sidebar-right">
            <div>
                <h3>Menu Settings</h3>
                <label style="font-size: 0.7rem; font-weight: 700;">Template</label>
                <select id="tmpl-select" onchange="updateTemplate()" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border);">
                    <option value="tmpl-light">Clean Light</option>
                    <option value="tmpl-dark">Modern Dark</option>
                    <option value="tmpl-rustic">Rustic Vintage</option>
                </select>

                <label style="font-size: 0.7rem; font-weight: 700;">Paper Size</label>
                <select id="size-select" onchange="updateSize()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);">
                    <option value="letter">Letter (8.5 x 11")</option>
                    <option value="a4">A4 (210 x 297mm)</option>
                </select>
            </div>

            <div id="element-props" class="hidden">
                <h3>Element Properties</h3>
                <div id="prop-controls">
                    <!-- Dynamic controls for selected element -->
                </div>
            </div>
        </aside>
    </div>

    <div class="floating-footer">
        <button class="btn-action btn-save" onclick="saveLayout()">Save Changes</button>
        <button class="btn-action btn-pdf" id="btn-download" onclick="exportPDF()">Export PDF</button>
    </div>

    <script type="module">
        import { supabase } from './supabase.js';

        let user = null, role = null, activeId = null;
        let restaurant = null, menu = null;
        let selectedEl = null;

        const TOAST = $('#toast');
        window.showToast = (msg) => {
            TOAST.text(msg).css('transform', 'translateX(0)');
            setTimeout(() => TOAST.css('transform', 'translateX(120%)'), 3000);
        };

        $(document).ready(async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { location.href = 'index.html'; return; }
            user = session.user;

            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            role = (profile?.role || 'OWNER').toUpperCase();
            activeId = user.id;

            $('#user-pill').text(`${profile?.username || user.email} (${role})`);

            if (['ADMIN', 'DEVELOPER', 'CS', 'ADMINCS'].includes(role)) {
                $('#project-switcher').removeClass('hidden');
                loadAllUsers();
            } else {
                $('#btn-download').addClass('hidden'); // Owner can't download per request
            }

            loadData();
        });

        async function loadAllUsers() {
            const { data } = await supabase.from('profiles').select('id, username, email').order('username');
            const select = $('#context-select');
            select.empty();
            data.forEach(p => select.append(`<option value="${p.id}" ${p.id === activeId ? 'selected' : ''}>${p.username || p.email}</option>`));
        }

        window.switchContext = (id) => {
            activeId = id;
            loadData();
        };

        async function loadData() {
            const [res, men] = await Promise.all([
                supabase.from('menutech_restaurants').select('*').eq('user_id', activeId).maybeSingle(),
                supabase.from('menutech_menus').select('*').eq('user_id', activeId).maybeSingle()
            ]);
            restaurant = res.data;
            menu = men.data;

            renderToolbox();
            loadSavedLayout();
        }

        function renderToolbox() {
            const catList = $('#categories-list').empty();
            menu?.config?.categories?.forEach(c => {
                catList.append(`<div class="tool-item" onclick="addCategory('${c.name}')"><span>📂</span> ${c.name}</div>`);
            });

            const gallery = $('#gallery').empty();
            let images = [];
            if (restaurant?.logo_url) images.push(restaurant.logo_url);
            menu?.config?.categories?.forEach(c => {
                if (c.image) images.push(c.image);
                c.dishes?.forEach(d => { if(d.image) images.push(d.image); });
            });
            [...new Set(images)].filter(Boolean).forEach(url => {
                gallery.append(`<img src="${url}" class="image-thumb" onclick="addElement('image', '${url}')">`);
            });
        }

        window.addPage = () => {
            const page = $(`
                <div class="page-wrapper">
                    <div class="page ${$('#tmpl-select').val()}"></div>
                    <button class="btn-action" style="position:absolute; right:-120px; top:0; background:white; color:var(--error); border:1px solid var(--border);" onclick="$(this).parent().remove()">Remove</button>
                </div>
            `);
            $('#designer-canvas').append(page);
            updateSize();
            return page.find('.page');
        };

        window.addElement = (type, content = null) => {
            const page = $('#designer-canvas .page').last();
            if (page.length === 0) return showToast("Add a page first!");

            let html = '';
            if (type === 'logo') html = `<img src="${restaurant?.logo_url || ''}" style="width:120px;">`;
            if (type === 'name') html = `<h1 style="font-family:'Bebas Neue'; font-size:4rem; line-height:1;">${restaurant?.name || 'NAME'}</h1>`;
            if (type === 'contact') html = `<p style="font-family:'Outfit'; font-size:1rem;">${restaurant?.phone || ''} • ${restaurant?.address || ''}</p>`;
            if (type === 'image') html = `<img src="${content}" style="width:150px; border-radius:10px; box-shadow:0 10px 20px rgba(0,0,0,0.1);">`;

            createCanvasElement(page, type, html);
        };

        function createCanvasElement(page, type, html, x = 50, y = 50) {
            const el = $(`
                <div class="canvas-element" data-type="${type}" style="transform: translate(${x}px, ${y}px);" data-x="${x}" data-y="${y}">
                    <div class="el-content" contenteditable="true">${html}</div>
                    <button class="delete-btn" onclick="$(this).parent().remove()">×</button>
                </div>
            `);

            el.on('mousedown', function() {
                $('.canvas-element').removeClass('selected');
                $(this).addClass('selected');
                selectedEl = $(this);
                $('#element-props').removeClass('hidden');
            });

            interact(el[0]).draggable({
                listeners: {
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    }
                }
            }).resizable({
                edges: { left: true, right: true, bottom: true, top: true },
                listeners: {
                    move(event) {
                        const target = event.target;
                        let x = (parseFloat(target.getAttribute('data-x')) || 0);
                        let y = (parseFloat(target.getAttribute('data-y')) || 0);
                        target.style.width = event.rect.width + 'px';
                        target.style.height = event.rect.height + 'px';
                        x += event.deltaRect.left;
                        y += event.deltaRect.top;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    }
                }
            });

            page.append(el);
            return el;
        }

        window.addCategory = (catName) => {
            const page = $('#designer-canvas .page').last();
            const cat = menu?.config?.categories?.find(c => c.name === catName);
            if (!cat || page.length === 0) return;

            const header = createCanvasElement(page, 'cat-header', `<div class="brush-header">${cat.name}</div>`);

            let currentY = 150;
            cat.dishes?.forEach(d => {
                const dishHtml = `
                    <div style="width:500px; margin-bottom:10px;">
                        <div class="item-row">
                            <span>${d.name}</span>
                            <div class="item-dots"></div>
                            <span>$${d.price}</span>
                        </div>
                        <div style="font-family:'Outfit'; font-size:0.8rem; font-weight:300; opacity:0.8;">${d.description || ''}</div>
                    </div>
                `;
                createCanvasElement(page, 'dish', dishHtml, 50, currentY);
                currentY += 60;
            });
        };

        window.autoFlow = () => {
            $('#designer-canvas').empty();
            let page = addPage();
            let y = 100;

            // Header
            createCanvasElement(page, 'logo', `<img src="${restaurant?.logo_url}" style="width:100px;">`, 300, 40);
            y = 150;

            menu?.config?.categories?.forEach(cat => {
                if (y > 800) { page = addPage(); y = 80; }

                createCanvasElement(page, 'cat-header', `<div class="brush-header">${cat.name}</div>`, 50, y);
                y += 80;

                cat.dishes?.forEach(d => {
                    if (y > 950) { page = addPage(); y = 80; }
                    const html = `
                        <div style="width:700px;">
                            <div class="item-row"><span>${d.name}</span><div class="item-dots"></div><span>$${d.price}</span></div>
                            <div style="font-family:'Outfit'; font-size:0.9rem; font-weight:300; opacity:0.8;">${d.description || ''}</div>
                        </div>
                    `;
                    createCanvasElement(page, 'dish', html, 50, y);
                    y += d.description ? 70 : 40;
                });
                y += 40;
            });
        };

        window.updateTemplate = () => {
            const tmpl = $('#tmpl-select').val();
            $('.page').removeClass('tmpl-light tmpl-dark tmpl-rustic').addClass(tmpl);
        };

        window.updateSize = () => {
            const size = $('#size-select').val();
            const w = size === 'letter' ? '8.5in' : '210mm';
            const h = size === 'letter' ? '11in' : '297mm';
            $('.page').css({ width: w, height: h });
        };

        window.saveLayout = async () => {
            const pages = [];
            $('#designer-canvas .page').each(function() {
                const els = [];
                $(this).find('.canvas-element').each(function() {
                    const e = $(this);
                    els.push({
                        type: e.data('type'),
                        x: e.attr('data-x'),
                        y: e.attr('data-y'),
                        w: e.css('width'),
                        h: e.css('height'),
                        content: e.find('.el-content').html()
                    });
                });
                pages.push(els);
            });

            const config = {
                pages,
                tmpl: $('#tmpl-select').val(),
                size: $('#size-select').val()
            };

            const { error } = await supabase.from('menutech_physical_menus').upsert({
                user_id: activeId,
                template_id: 'v2',
                layout_config: config
            }, { onConflict: 'user_id, template_id' });

            if (error) showToast("Error saving: " + error.message);
            else showToast("Layout saved successfully!");
        };

        async function loadSavedLayout() {
            const { data } = await supabase.from('menutech_physical_menus').select('*').eq('user_id', activeId).eq('template_id', 'v2').maybeSingle();
            $('#designer-canvas').empty();

            if (data?.layout_config) {
                const cfg = data.layout_config;
                $('#tmpl-select').val(cfg.tmpl);
                $('#size-select').val(cfg.size);

                cfg.pages.forEach(pEls => {
                    const page = addPage();
                    pEls.forEach(e => {
                        const el = createCanvasElement(page, e.type, e.content, parseFloat(e.x), parseFloat(e.y));
                        el.css({ width: e.w, height: e.h });
                    });
                });
            } else {
                addPage();
            }
            updateTemplate();
            updateSize();
        }

        window.exportPDF = () => {
            const element = document.createElement('div');
            $('#designer-canvas .page').each(function() {
                const clone = $(this).clone();
                clone.find('.delete-btn').remove();
                clone.find('.canvas-element').css('outline', 'none');
                clone.css({ margin: '0', boxShadow: 'none' });
                element.appendChild(clone[0]);
            });

            const size = $('#size-select').val();
            const opt = {
                margin: 0,
                filename: 'menu-menutech.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: size === 'letter' ? 'letter' : 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        };

    </script>
</body>
</html>
