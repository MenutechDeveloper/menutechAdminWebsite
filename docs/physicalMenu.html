<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physical Menu Designer | Menutech</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">

    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@4.0.0/turn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&family=Permanent+Marker&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --success: #059669;
            --error: #dc2626;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .container { width: 100%; max-width: 1600px; margin: 0 auto; padding: 100px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Top Nav */
        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }
        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; }

        /* Sidebar Container */
        .sidebar-container {
            position: fixed; left: 0; top: 120px; z-index: 6000; pointer-events: none; display: flex; align-items: flex-start;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar-container > * { pointer-events: auto; }
        .sidebar-container.collapsed { transform: translateX(-340px) !important; }
        .sidebar { width: 340px; height: 600px; display: flex; flex-direction: column; gap: 20px; }
        .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 24px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.15); height: 100%; display: flex; flex-direction: column; }
        .client-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .client-item { padding: 14px 18px; border-radius: 16px; background: var(--input); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .client-item:hover { border-color: var(--orange); }
        .client-item.active { border-color: var(--orange); background: rgba(255,149,51,0.08); }
        .sidebar-tab {
            width: 45px; height: 160px; background: var(--orange); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; cursor: pointer; writing-mode: vertical-lr; text-orientation: mixed; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; box-shadow: 10px 0 30px rgba(255, 149, 51, 0.2); transition: 0.4s; margin-top: 40px; position: relative;
        }

        /* Editor Layout */
        .editor-layout { display: flex; gap: 30px; min-height: 800px; position: relative; }

        /* Left Toolbox */
        .toolbox {
            width: 300px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-height: 85vh; overflow-y: auto;
        }
        .toolbox h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--orange); letter-spacing: 1px; }
        .tool-section { display: flex; flex-direction: column; gap: 10px; }
        .draggable-item {
            padding: 12px; background: var(--input); border: 1.5px solid var(--border); border-radius: 12px;
            cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.3s;
        }
        .draggable-item:hover { border-color: var(--orange); transform: translateY(-2px); }

        /* Main Designer Area */
        .book-container {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 40px;
            background: rgba(0,0,0,0.02); border-radius: 30px; padding: 40px; position: relative;
            min-height: 800px;
        }

        /* Workspace Grid */
        #designer-workspace {
            display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; width: 100%;
        }

        /* Preview Container */
        #preview-container {
            display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center;
        }
        #preview-container.active { display: flex; }

        #menu-book { margin: 0 auto; }
        .page {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            width: 571px; /* Default Letter 0.7x scale approx */
            height: 739px;
            flex-shrink: 0;
        }
        .page-content { width: 100%; height: 100%; position: relative; padding: 40px; }

        .page-content[data-page-type="cover"]::after {
            content: 'PORTADA / COVER'; position: absolute; top: 10px; right: 10px;
            font-size: 0.6rem; font-weight: 800; color: var(--orange); opacity: 0.5;
            letter-spacing: 1px; border: 1px solid var(--orange); padding: 2px 6px; border-radius: 4px;
        }
        .page-content[data-page-type="back"]::after {
            content: 'CONTRA PORTADA / BACK'; position: absolute; top: 10px; right: 10px;
            font-size: 0.6rem; font-weight: 800; color: var(--orange); opacity: 0.5;
            letter-spacing: 1px; border: 1px solid var(--orange); padding: 2px 6px; border-radius: 4px;
        }

        /* Textures */
        .texture-chalkboard { background-color: #1a1a1a; background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); color: white; }
        .texture-paper { background-color: #f4f1ea; background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        .texture-dark-wood { background-color: #2c1e14; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); color: #e0c9a6; }
        .texture-green-slate { background-color: #1e3a34; background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); color: #f0f0f0; }
        .texture-leather { background-color: #3d1f1f; background-image: url('https://www.transparenttextures.com/patterns/black-leather.png'); color: #d4af37; }

        /* Canvas Elements */
        .canvas-element { position: absolute; cursor: move; touch-action: none; user-select: none; }
        .canvas-element:hover::after { content: ''; position: absolute; inset: -5px; border: 2px dashed var(--orange); border-radius: 4px; pointer-events: none; }
        .delete-btn { position: absolute; top: -15px; right: -15px; background: var(--error); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: none; z-index: 10; font-weight: bold; }
        .canvas-element:hover .delete-btn { display: block; }

        .circle-crop { border-radius: 50%; overflow: hidden; object-fit: cover; }
        .border-ornate { border: 20px solid transparent; border-image: url('https://www.transparenttextures.com/patterns/pinstripe.png') 30 stretch; }

        /* Right Properties Panel */
        .properties-panel {
            width: 280px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Floating Controls */
        #floating-controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            padding: 16px 32px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; gap: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); z-index: 7000;
        }
        .btn-action { padding: 14px 28px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; border: none; letter-spacing: 1px; }
        .btn-save { background: var(--orange); color: white; }
        .btn-download { background: var(--success); color: white; }

        /* Template Selection Tabs */
        .template-tabs { display: flex; gap: 10px; margin-bottom: 30px; width: 100%; justify-content: center; }
        .tab-btn { padding: 12px 24px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-weight: 800; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { background: var(--orange); color: white; border-color: var(--orange); transform: translateY(-2px); }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 20000; display: flex; flex-direction: column; gap: 12px; }
        .toast { padding: 18px 24px; border-radius: 20px; background: #1c1f26; color: white; font-size: 0.9rem; animation: slideIn 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Custom Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            z-index: 21000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card); border: 1.5px solid var(--border); border-radius: 32px;
            padding: 40px; width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.3); transform: scale(0.9); transition: 0.3s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-title { font-family: 'Outfit'; font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; }
        .modal-text { color: var(--text-dim); margin-bottom: 30px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 15px; justify-content: center; }

        .hidden { display: none !important; }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 30000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        .loader {
            width: 48px; height: 48px; border: 5px solid var(--orange);
            border-bottom-color: transparent; border-radius: 50%;
            display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader"></div>
        <p style="margin-top: 20px; font-weight: 800; color: var(--orange); letter-spacing: 2px;">PREPARING MENU...</p>
    </div>

    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <div id="top-nav">
        <div><button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="user-display-pill" style="background: var(--card); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; pointer-events: auto;">
                <div style="display: flex; flex-direction: column; line-height: 1.2;">
                    <span id="user-name" style="font-weight: 800; font-size: 0.85rem;">Loading...</span>
                    <span id="user-role-label" style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase;">...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="template-tabs">
            <button class="tab-btn active" data-tid="diseno1" onclick="switchTemplate('diseno1')">Diseno 1</button>
            <button class="tab-btn" data-tid="diseno2" onclick="switchTemplate('diseno2')">Diseno 2</button>
            <button class="tab-btn" data-tid="diseno3" onclick="switchTemplate('diseno3')">Diseno 3</button>
        </div>

        <div class="editor-layout">
            <div class="sidebar-container collapsed" id="sidebar-container">
                <div class="sidebar">
                    <div class="search-box">
                        <h3 style="margin-bottom: 15px;">PROJECTS</h3>
                        <input type="text" id="client-search" placeholder="Search restaurant..." style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px;">
                        <div class="client-list" id="client-list"></div>
                    </div>
                </div>
                <div class="sidebar-tab" id="sidebar-tab">PROJECTS</div>
            </div>

            <div class="toolbox">
                <div class="tool-section">
                    <h3>Cover & Info</h3>
                    <div class="draggable-item" onclick="addCoverElement('logo')">Restaurant Logo</div>
                    <div class="draggable-item" onclick="addCoverElement('name')">Restaurant Name</div>
                    <div class="draggable-item" onclick="addCoverElement('tagline')">Add Tagline</div>
                    <div class="draggable-item" onclick="addCoverElement('address')">Address (Back)</div>
                    <div class="draggable-item" onclick="addCoverElement('phone')">Phone (Back)</div>
                </div>
                <div class="tool-section">
                    <h3>Menu Content</h3>
                    <div class="draggable-item" onclick="addMenuElement('categories')">All Categories (Auto)</div>
                    <div id="cat-list-toolbox" style="display: flex; flex-direction: column; gap: 5px;"></div>
                </div>
                <div class="tool-section">
                    <h3>Images & Stains</h3>
                    <div id="image-list-toolbox" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
                    <div id="stains-toolbox" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
                </div>
            </div>

            <div class="book-container">
                <div id="designer-workspace">
                    <!-- Workspace cards (flat design) -->
                </div>

                <div id="preview-container">
                    <div id="menu-book">
                        <!-- turn.js book -->
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="tab-btn" id="btn-add-page" onclick="addPage()">+ Add Page</button>
                    <button class="tab-btn" id="btn-remove-page" style="color:var(--error)" onclick="removeCurrentPage()">- Remove Page</button>
                    <div id="preview-controls" class="hidden" style="display: flex; gap: 10px;">
                        <button class="tab-btn" onclick="prevPage()">Previous</button>
                        <button class="tab-btn" onclick="nextPage()">Next</button>
                    </div>
                </div>
            </div>

            <div class="properties-panel">
                <h3>Style & Page</h3>
                <div class="tool-section">
                    <label style="font-size: 0.7rem; font-weight: 700;">Paper Size</label>
                    <select id="paper-size-select" onchange="window.updatePaperSize()" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border);">
                        <option value="letter">Letter (8.5 x 11")</option>
                        <option value="a4">A4 (210 x 297mm)</option>
                        <option value="custom">Custom Size</option>
                    </select>
                </div>
                <div id="custom-size-inputs" class="hidden" style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.6rem;">Width (in)</label>
                        <input type="number" id="custom-w" value="8.5" step="0.1" onchange="window.updatePaperSize()" style="width: 100%; padding: 5px; border-radius: 5px; border: 1px solid var(--border);">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.6rem;">Height (in)</label>
                        <input type="number" id="custom-h" value="11" step="0.1" onchange="window.updatePaperSize()" style="width: 100%; padding: 5px; border-radius: 5px; border: 1px solid var(--border);">
                    </div>
                </div>
                <div class="tool-section">
                    <label style="font-size: 0.7rem; font-weight: 700;">Page Background</label>
                    <select id="bg-texture-select" onchange="updatePageStyle()" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border);">
                        <option value="white">White Paper</option>
                        <option value="texture-chalkboard">Chalkboard</option>
                        <option value="texture-paper">Vintage Paper</option>
                        <option value="texture-dark-wood">Dark Wood</option>
                        <option value="texture-green-slate">Green Slate</option>
                        <option value="texture-leather">Burgundy Leather</option>
                    </select>
                </div>
                <div class="tool-section">
                    <label style="font-size: 0.7rem; font-weight: 700;">Image Style</label>
                    <div style="display: flex; gap: 10px;">
                        <button class="draggable-item" style="flex: 1;" onclick="applyImageStyle('square')">Square</button>
                        <button class="draggable-item" style="flex: 1;" onclick="applyImageStyle('circle')">Circle</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="floating-controls">
        <button class="btn-action" id="btn-toggle-mode" onclick="toggleMode()" style="background: var(--text); color: white;">PREVIEW MODE</button>
        <button class="btn-action btn-save" onclick="saveLayout()">Save Menu</button>
        <button class="btn-action btn-download" id="download-pdf" onclick="generatePDF()">Download PDF</button>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <h2 class="modal-title">Wait a second!</h2>
            <p class="modal-text" id="confirm-modal-text">Switching templates will load its saved layout. Save current work first?</p>
            <div class="modal-actions">
                <button class="btn-action" style="background: var(--input); border: 1.5px solid var(--border);" onclick="closeConfirmModal(false)">NO, JUST SWITCH</button>
                <button class="btn-action btn-save" onclick="closeConfirmModal(true)">YES, SAVE FIRST</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase as sb } from './supabase.js';

        let user = null, userRole = null, activeOwnerId = null;
        let menuData = null, restaurantInfo = null;
        let currentPageIndex = 1;
        let currentTemplateId = 'diseno1';
        let isPreviewMode = false;

        window.showToast = (msg, type='success') => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        };

        let confirmCallback = null;
        window.showConfirmModal = (msg, callback) => {
            $('#confirm-modal-text').text(msg);
            $('#confirm-modal').addClass('active');
            confirmCallback = callback;
        };

        window.closeConfirmModal = (shouldSave) => {
            $('#confirm-modal').removeClass('active');
            if (confirmCallback) confirmCallback(shouldSave);
            confirmCallback = null;
        };

        $(document).ready(async () => {
            window.initSidebar();
            await window.checkSession();

            setTimeout(() => {
                $('#loading-overlay').css('opacity', '0');
                setTimeout(() => $('#loading-overlay').addClass('hidden'), 500);
            }, 3000);
        });

        window.initSidebar = () => {
            $('#sidebar-tab').on('click', () => $('#sidebar-container').toggleClass('collapsed'));
        };

        window.checkSession = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = "index.html"; return; }
            user = session.user;

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            userRole = (profile?.role || 'OWNER').toUpperCase();
            activeOwnerId = user.id;

            $('#user-name').text(profile?.username || user.email.split('@')[0]);
            $('#user-role-label').text(userRole);

            if (['ADMIN', 'DEVELOPER', 'CS', 'ADMINCS'].includes(userRole)) {
                $('#sidebar-container').removeClass('hidden');
                window.setupContextSwitcher();
            } else {
                $('#download-pdf').addClass('hidden');
            }

            await window.loadRestaurantData();
        };

        window.setupContextSwitcher = async () => {
            const { data } = await sb.from('profiles').select('*');
            const render = (owners) => {
                $('#client-list').html(owners.map(o => `
                    <div class="client-item ${activeOwnerId === o.id ? 'active' : ''}" onclick="window.switchContext('${o.id}')">
                        <span style="font-weight: 700; font-size: 0.85rem;">${o.username || o.email}</span>
                    </div>
                `).join(''));
            };
            render(data || []);
            $('#client-search').on('input', function() {
                const term = $(this).val().toLowerCase();
                render(data.filter(o => (o.username||'').toLowerCase().includes(term) || (o.email||'').toLowerCase().includes(term)));
            });
            window.switchContext = (id) => { activeOwnerId = id; setupContextSwitcher(); loadRestaurantData(); };
        }

        window.loadRestaurantData = async () => {
            const { data: res } = await sb.from('menutech_restaurants').select('*').eq('user_id', activeOwnerId).maybeSingle();
            restaurantInfo = res;
            const { data: menu } = await sb.from('menutech_menus').select('*').eq('user_id', activeOwnerId).maybeSingle();
            menuData = menu;

            window.updateToolbox();
            window.loadSavedLayout();
        };

        window.initBook = () => {
            const book = $('#menu-book');
            if (book.turn('is')) book.turn('destroy');
            book.empty();

            const size = getPaperDimensions();

            // Adjust CSS for pages and ensure book visibility
            $('#dynamic-page-size').remove();
            $('<style id="dynamic-page-size">')
                .prop('type', 'text/css')
                .html(`
                    #menu-book { width: ${size.totalWidth}px; height: ${size.height}px; visibility: visible !important; opacity: 1 !important; }
                    .page { width: ${size.pageWidth}px; height: ${size.height}px; background-color: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
                    .page-content { width: 100%; height: 100%; position: relative; padding: 40px; background-color: inherit; }
                `)
                .appendTo('head');

            // Clone pages from workspace to book for preview
            $('#designer-workspace .page').each(function() {
                const clone = $(this).clone();
                clone.find('.delete-btn').remove();
                clone.find('.canvas-element').css('outline', 'none');
                book.append(clone);
            });

            book.turn({
                width: size.totalWidth,
                height: size.height,
                autoCenter: true,
                display: 'double',
                acceleration: true,
                elevation: 50,
                gradients: true,
                duration: 800,
                when: {
                    turned: function(e, page) {
                        currentPageIndex = page;
                        $(this).turn('center');
                    }
                }
            });

            // Force center and page 1
            setTimeout(() => {
                if (book.turn('pages') > 0) {
                    book.turn('page', 1);
                    book.turn('center');
                    setTimeout(() => book.turn('center'), 300);
                }
            }, 500);
        }

        window.getPaperDimensions = () => {
            const size = $('#paper-size-select').val() || 'letter';
            const scale = 0.7;
            if (size === 'a4') {
                return { pageWidth: 794 * scale, height: 1123 * scale, totalWidth: 794 * 2 * scale };
            }
            if (size === 'custom') {
                const w = parseFloat($('#custom-w').val()) * 96; // 96 DPI
                const h = parseFloat($('#custom-h').val()) * 96;
                return { pageWidth: w * scale, height: h * scale, totalWidth: w * 2 * scale };
            }
            // Letter default
            return { pageWidth: 816 * scale, height: 1056 * scale, totalWidth: 816 * 2 * scale };
        };

        window.updatePaperSize = () => {
            const sizeVal = $('#paper-size-select').val();
            if (sizeVal === 'custom') $('#custom-size-inputs').removeClass('hidden').css('display', 'flex');
            else $('#custom-size-inputs').addClass('hidden').hide();

            const book = $('#menu-book');
            const size = window.getPaperDimensions();

            $('#dynamic-page-size').remove();
            $('<style id="dynamic-page-size">')
                .prop('type', 'text/css')
                .html(`.page { width: ${size.pageWidth}px; height: ${size.height}px; }`)
                .appendTo('head');

            if (book.turn('is')) {
                book.turn('size', size.totalWidth, size.height);
            }
            showToast(`Paper size updated to ${$('#paper-size-select option:selected').text()}`);
        };

        window.addPage = () => {
            const workspace = $('#designer-workspace');
            const pageNum = workspace.children('.page').length + 1;
            const element = $(`<div class="page p${pageNum}"><div class="page-content"></div></div>`);
            workspace.append(element);
            updatePageStyle();
            showToast("New page added");
            return element;
        };

        window.nextPage = () => $('#menu-book').turn('next');
        window.prevPage = () => $('#menu-book').turn('previous');

        window.removeCurrentPage = () => {
            const workspace = $('#designer-workspace');
            const pages = workspace.children('.page');
            if (pages.length <= 2) {
                showToast("Minimum 2 pages required", "error");
                return;
            }
            pages.last().remove();
            showToast("Last page removed");
        };

        window.updateToolbox = () => {
            // Fill categories
            const catList = $('#cat-list-toolbox');
            catList.empty();
            if (menuData?.config?.categories) {
                menuData.config.categories.forEach(c => {
                    catList.append(`<div class="draggable-item" onclick="addCategoryToPage('${c.name}')">${c.name}</div>`);
                });
            }

            // Fill images
            const imgList = $('#image-list-toolbox');
            imgList.empty();
            let images = [];
            if (restaurantInfo?.logo_url) images.push(restaurantInfo.logo_url);
            if (menuData?.cover_url) images.push(menuData.cover_url);
            if (menuData?.config?.categories) {
                menuData.config.categories.forEach(c => {
                    if (c.image) images.push(c.image);
                    c.dishes?.forEach(d => { if(d.image) images.push(d.image); });
                });
            }
            [...new Set(images)].forEach(url => {
                imgList.append(`<img src="${url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer;" onclick="addImageToPage('${url}')">`);
            });

            // Fill stains (Sample placeholders)
            const stainsList = $('#stains-toolbox');
            stainsList.empty();
            const stains = [
                { url: 'https://cdn-icons-png.flaticon.com/512/3233/3233514.png', name: 'Coffee' },
                { url: 'https://cdn-icons-png.flaticon.com/512/5900/5900543.png', name: 'Splatter' },
                { url: 'https://cdn-icons-png.flaticon.com/512/1063/1063251.png', name: 'Wine' },
                { url: 'https://cdn-icons-png.flaticon.com/512/3159/3159066.png', name: 'Ink' },
                { url: 'https://cdn-icons-png.flaticon.com/512/2550/2550302.png', name: 'Flour' },
                { url: 'https://cdn-icons-png.flaticon.com/512/751/751505.png', name: 'Ornament' }
            ];
            stains.forEach(s => {
                stainsList.append(`<img src="${s.url}" title="${s.name}" style="width:100%; opacity:0.5; cursor:pointer; filter: grayscale(1);" onclick="addImageToPage('${s.url}', true)">`);
            });
        }

        window.getPageContent = (n) => {
            if (!isPreviewMode) {
                return $('#designer-workspace .page').eq(n - 1).find('.page-content');
            }
            const book = $('#menu-book');
            let p = book.find('.p' + n);
            if (p.length === 0) {
                p = book.find('.page').eq(n - 1);
            }
            return p.find('.page-content');
        }

        window.addCoverElement = (type, autoPos = false) => {
            const page = getPageContent(1);
            let content = '';
            const dim = getPaperDimensions();

            let initialX = 50, initialY = 50, initialWidth = 'auto';

            if (type === 'logo') {
                content = `<img src="${restaurantInfo?.logo_url || ''}" style="width: 100%; display: block;">`;
                if (autoPos) {
                    initialWidth = 240;
                    initialX = (dim.pageWidth - initialWidth) / 2;
                    initialY = 150;
                }
            }
            if (type === 'name') {
                content = `<h1 style="font-family:'Outfit'; font-size: 3.5rem; text-align:center; width: 100%;">${restaurantInfo?.name || 'Restaurant Name'}</h1>`;
                if (autoPos) {
                    initialWidth = dim.pageWidth - 80;
                    initialX = 40;
                    initialY = 450;
                }
            }
            if (type === 'tagline') {
                content = `<p style="font-family:'Permanent Marker'; font-size: 1.8rem; text-align:center; width: 100%;">Authentic Flavors</p>`;
                if (autoPos) {
                    initialWidth = dim.pageWidth - 80;
                    initialX = 40;
                    initialY = 600;
                }
            }
            if (type === 'address') {
                content = `<p style="font-family:'Outfit'; font-size: 1.2rem; text-align:center; width: 100%;">${restaurantInfo?.address || 'Street Name, City'}</p>`;
            }
            if (type === 'phone') {
                content = `<p style="font-family:'Outfit'; font-size: 1.2rem; text-align:center; width: 100%;">${restaurantInfo?.phone || '555-0123'}</p>`;
            }

            const el = createElement(type, content);
            el.css({
                left: '0px',
                top: '0px',
                width: initialWidth === 'auto' ? 'auto' : initialWidth + 'px',
                transform: `translate(${initialX}px, ${initialY}px)`
            });
            el.attr('data-x', initialX);
            el.attr('data-y', initialY);

            page.append(el);
            makeInteract(el);

            if (!autoPos) $('#menu-book').turn('page', 1);
        };

        window.addImageToPage = (url, isStain = false) => {
            const pageNum = isPreviewMode ? $('#menu-book').turn('page') : 1;
            const page = getPageContent(pageNum);
            const content = `<img src="${url}" style="width: ${isStain ? '150px' : '200px'}; opacity: ${isStain ? 0.4 : 1};">`;
            const el = createElement('image', content);
            page.append(el);
            makeInteract(el);
        };

        window.addMenuElement = (type) => {
            if (type === 'categories') {
                autoFlowCategories();
            }
        };

        async function autoFlowCategories() {
            if (!menuData?.config?.categories) return;

            let currentPage = 2; // Start from page 2 (Page 1 is cover)
            const dimensions = getPaperDimensions();
            const maxPageHeight = (dimensions.height / 0.7) * 0.7 - 120;

            // Clear existing categories from workspace
            $('#designer-workspace .page .page-content:not([data-page-type="cover"]) .canvas-element[data-type="category"]').remove();

            for (const cat of menuData.config.categories) {
                // Ensure target page exists in workspace
                while ($('#designer-workspace .page').length < currentPage) {
                    addPage();
                }

                let el = addCategoryToPage(cat.name, currentPage);
                let currentHeight = getPageContentHeight(currentPage);

                if (currentHeight > maxPageHeight) {
                    // Move the element that overflowed to the next page
                    el.remove();
                    currentPage++;
                    while ($('#menu-book').turn('pages') < currentPage) {
                        addPage();
                    }
                    addCategoryToPage(cat.name, currentPage);
                }
            }
            $('#menu-book').turn('page', 2);
            showToast("Categories auto-flowed!");
        }

        window.addCategoryToPage = (catName, targetPageNum) => {
            const pageNum = targetPageNum || (isPreviewMode ? $('#menu-book').turn('page') : 1);
            const page = getPageContent(pageNum);
            const cat = menuData.config.categories.find(c => c.name === catName);

            const content = `
                <div class="category-block" style="width: 100%; padding: 15px; border-bottom: 2px solid var(--orange); pointer-events: none;">
                    <h3 style="font-family:'Playfair Display'; font-size: 1.8rem; margin-bottom:10px;">${cat.name}</h3>
                    <div class="dishes-container">
                    ${cat.dishes.map(d => `
                        <div class="dish-item" style="display:flex; gap: 15px; margin-bottom:15px; align-items: flex-start;">
                            ${d.image ? `<img src="${d.image}" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover;">` : ''}
                            <div style="flex: 1;">
                                <div style="display:flex; justify-content:space-between;">
                                    <span><b>${d.name}</b></span>
                                    <span>$${d.price}</span>
                                </div>
                                <p style="font-size: 0.75rem; opacity:0.8;">${d.description || ''}</p>
                            </div>
                        </div>
                    `).join('')}
                    </div>
                </div>
            `;
            const el = createElement('category', content);
            el.css({ width: '100%', left: '0', position: 'relative', transform: 'none' });
            el.removeAttr('data-x data-y');
            page.append(el);
            makeInteract(el);
            return el;
        };

        window.getPageContentHeight = (pageNum) => {
            const page = getPageContent(pageNum);
            let totalHeight = 0;
            page.children('.canvas-element').each(function() {
                totalHeight += $(this).outerHeight(true);
            });
            return totalHeight;
        }

        window.createElement = (type, content) => {
            const el = $(`<div class="canvas-element" data-type="${type}" style="left:50px; top:50px;"></div>`);
            el.html(content + `<button class="delete-btn" onclick="$(this).parent().remove()">×</button>`);
            return el;
        }

        let selectedElement = null;

        window.makeInteract = (el) => {
            el.on('mousedown', function(e) {
                e.stopPropagation();
                $('.canvas-element').css('outline', 'none');
                $(this).css('outline', '2px solid var(--orange)');
                selectedElement = $(this);
            });

            interact(el[0])
                .draggable({
                    listeners: {
                        move (event) {
                            var target = event.target
                            var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx
                            var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy
                            target.style.transform = 'translate(' + x + 'px, ' + y + 'px)'
                            target.setAttribute('data-x', x)
                            target.setAttribute('data-y', y)
                        }
                    }
                })
                .resizable({
                    edges: { left: true, right: true, bottom: true, top: true },
                    listeners: {
                        move (event) {
                            var target = event.target
                            var x = (parseFloat(target.getAttribute('data-x')) || 0)
                            var y = (parseFloat(target.getAttribute('data-y')) || 0)
                            target.style.width = event.rect.width + 'px'
                            target.style.height = event.rect.height + 'px'
                            x += event.deltaRect.left
                            y += event.deltaRect.top
                            target.style.transform = 'translate(' + x + 'px, ' + y + 'px)'
                            target.setAttribute('data-x', x)
                            target.setAttribute('data-y', y)
                        }
                    }
                });
        }

        window.updatePageStyle = () => {
            const texture = $('#bg-texture-select').val();
            $('.page').removeClass('texture-chalkboard texture-paper texture-dark-wood texture-green-slate texture-leather').addClass(texture);
        };

        window.switchTemplate = (templateId) => {
            if (templateId === currentTemplateId) return;

            showConfirmModal("Switching templates will load its saved layout. Save current work first?", async (shouldSave) => {
                if (shouldSave) {
                    await saveLayout();
                }
                currentTemplateId = templateId;
                $('.tab-btn').removeClass('active');
                $(`button[data-tid="${templateId}"]`).addClass('active');
                await loadSavedLayout();
            });
        };

        window.applyImageStyle = (style) => {
            if (!selectedElement || selectedElement.data('type') !== 'image') {
                showToast("Please select an image first", "error");
                return;
            }
            const img = selectedElement.find('img');
            if (style === 'circle') {
                img.css({
                    'border-radius': '50%',
                    'aspect-ratio': '1/1',
                    'object-fit': 'cover'
                });
            } else if (style === 'square') {
                img.css({
                    'border-radius': '0',
                    'aspect-ratio': 'initial',
                    'object-fit': 'initial'
                });
            } else if (style === 'rounded') {
                img.css({
                    'border-radius': '20px',
                    'aspect-ratio': 'initial',
                    'object-fit': 'cover'
                });
            }
        };

        window.toggleMode = () => {
            if (isPreviewMode) {
                // Exit preview, go back to designer
                $('#preview-container').removeClass('active');
                $('#designer-workspace').show();
                $('#preview-controls').addClass('hidden');
                $('#btn-add-page, #btn-remove-page, .toolbox, .properties-panel').show();
                $('#btn-toggle-mode').text('PREVIEW MODE');
                isPreviewMode = false;
            } else {
                // Save first? Maybe not mandatory but recommended
                // Enter preview
                $('#designer-workspace').hide();
                $('#preview-container').addClass('active');
                $('#preview-controls').removeClass('hidden');
                $('#btn-add-page, #btn-remove-page, .toolbox, .properties-panel').hide();
                $('#btn-toggle-mode').text('DESIGN MODE');
                isPreviewMode = true;
                initBook();
            }
        };

        window.saveLayout = async () => {
            const pages = [];
            const workspace = $('#designer-workspace');

            workspace.children('.page').each(function(i) {
                const pageEl = $(this).find('.page-content');
                const elements = [];
                pageEl.children('.canvas-element').each(function() {
                    const el = $(this);
                    elements.push({
                        type: el.data('type'),
                        html: el.html(),
                        x: el.attr('data-x') || 0,
                        y: el.attr('data-y') || 0,
                        style: {
                            width: el.css('width'),
                            height: el.css('height'),
                            transform: el.css('transform'),
                            position: el.css('position'),
                            left: el.css('left'),
                            top: el.css('top'),
                            outline: 'none'
                        },
                        imgStyle: el.find('img').attr('style') || ''
                    });
                });
                pages.push({
                    elements,
                    type: pageEl.attr('data-page-type') || 'content'
                });
            });

            const layout_config = {
                pages,
                settings: {
                    texture: $('#bg-texture-select').val(),
                    paperSize: $('#paper-size-select').val(),
                    totalPages: pages.length
                }
            };

            const { error } = await sb.from('menutech_physical_menus').upsert({
                user_id: activeOwnerId,
                template_id: currentTemplateId,
                layout_config
            }, { onConflict: 'user_id, template_id' });

            if (error) showToast("Error saving: " + error.message, "error");
            else showToast("Layout saved!");
        };

        window.generatePDF = async () => {
            const paperSize = $('#paper-size-select').val();
            const workspace = $('#designer-workspace');
            const totalPages = workspace.children('.page').length;

            let pdfConfig = {
                letter: { width: 8.5, height: 11, format: 'letter' },
                a4: { width: 8.27, height: 11.69, format: 'a4' }
            }[paperSize];

            if (paperSize === 'custom') {
                pdfConfig = {
                    width: parseFloat($('#custom-w').val()),
                    height: parseFloat($('#custom-h').val()),
                    format: [parseFloat($('#custom-w').val()), parseFloat($('#custom-h').val())]
                };
            }

            if (!pdfConfig) pdfConfig = { width: 8.5, height: 11, format: 'letter' };

            const worker = html2pdf().set({
                margin: 0,
                filename: `menu_${activeOwnerId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: pdfConfig.format, orientation: 'portrait' }
            });

            // Hide UI elements during capture
            $('.delete-btn').hide();
            $('.canvas-element').css('outline', 'none');

            let pdfContainer = $('<div id="pdf-container"></div>');
            workspace.children('.page').each(function() {
                const pageClone = $(this).clone();
                pageClone.find('.delete-btn').remove();
                pageClone.css({
                    'width': `${pdfConfig.width}in`,
                    'height': `${pdfConfig.height}in`,
                    'display': 'block',
                    'position': 'relative',
                    'page-break-after': 'always',
                    'overflow': 'hidden',
                    'transform': 'none'
                });
                pageClone.find('.page-content').css({
                    'width': '100%',
                    'height': '100%',
                    'padding': '40px'
                });
                pdfContainer.append(pageClone);
            });

            worker.from(pdfContainer[0]).save().then(() => {
                $('.delete-btn').show();
            });
        };

        window.loadSavedLayout = async () => {
            const workspace = $('#designer-workspace');
            workspace.empty();

            let data = null;
            try {
                const response = await sb.from('menutech_physical_menus')
                    .select('*')
                    .eq('user_id', activeOwnerId)
                    .eq('template_id', currentTemplateId)
                    .maybeSingle();
                data = response.data;
            } catch (e) { console.error("Supabase load error:", e); }

            let isNew = false;
            if (data && data.layout_config) {
                const config = data.layout_config;
                $('#bg-texture-select').val(config.settings.texture || 'white');
                $('#paper-size-select').val(config.settings.paperSize || 'letter');

                config.pages.forEach((pageData, index) => {
                    const pageNum = index + 1;
                    const pageEl = $(`
                        <div class="page p${pageNum}">
                            <div class="page-content"></div>
                            <div class="page-number">PAGE ${pageNum}</div>
                        </div>
                    `);
                    const content = pageEl.find('.page-content');
                    if (pageData.type) content.attr('data-page-type', pageData.type);

                    pageData.elements.forEach(elData => {
                        const el = $(`<div class="canvas-element" data-type="${elData.type}"></div>`);
                        el.html(elData.html);
                        el.css(elData.style);
                        el.attr('data-x', elData.x);
                        el.attr('data-y', elData.y);
                        if (elData.imgStyle) el.find('img').attr('style', elData.imgStyle);
                        content.append(el);
                        window.makeInteract(el);
                    });
                    workspace.append(pageEl);
                });
            } else {
                isNew = true;
                if (currentTemplateId === 'diseno1') $('#bg-texture-select').val('texture-chalkboard');
                else if (currentTemplateId === 'diseno2') $('#bg-texture-select').val('texture-paper');
                else $('#bg-texture-select').val('white');

                workspace.append(`
                    <div class="page p1"><div class="page-content" data-page-type="cover"></div><div class="page-number">PAGE 1</div></div>
                    <div class="page p2"><div class="page-content"></div><div class="page-number">PAGE 2</div></div>
                    <div class="page p3"><div class="page-content"></div><div class="page-number">PAGE 3</div></div>
                    <div class="page p4"><div class="page-content" data-page-type="back"></div><div class="page-number">PAGE 4</div></div>
                `);
            }

            window.updatePaperSize();
            window.updatePageStyle();

            if (isNew) {
                // Auto-populate for first time
                setTimeout(() => {
                    window.addCoverElement('logo', true);
                    window.addCoverElement('name', true);
                    window.autoFlowCategories();
                }, 1000);
            }

            showToast(`Template ${currentTemplateId} loaded!`);
        }

    </script>
</body>
</html>
