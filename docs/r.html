<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | Menutech</title>
    <style>
        body {
            background: #121418;
            color: #ff9533;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid rgba(255, 149, 51, 0.1);
            border-top: 4px solid #ff9533;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #debug { position: fixed; bottom: 20px; font-size: 10px; color: #444; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="debug"></div>

    <script type="module">
        import { MT_CONFIG } from './config.js';
        import { supabase as sb } from './supabase.js';

        async function init() {
            const debug = document.getElementById('debug');
            const log = (msg) => { console.log(msg); debug.textContent += msg + " | "; };

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                log("No ID found in URL");
                window.location.href = 'https://menutech.io/retention';
                return;
            }

            // Fallback timeout: if it takes more than 6s, go to retention
            const fallback = setTimeout(() => {
                log("Timeout triggered");
                window.location.href = 'https://menutech.io/retention';
            }, 6000);

            try {
                log("Checking ID: " + id);
                const { data, error } = await sb
                    .from('qrcodes')
                    .select('url, is_active')
                    .eq('id', id)
                    .single();

                clearTimeout(fallback);

                if (error || !data) {
                    log("QR Error or not found: " + (error ? error.message : "No data"));
                    window.location.href = 'https://menutech.io/retention';
                    return;
                }

                log("Active: " + data.is_active);
                if (data.is_active && data.url) {
                    window.location.href = data.url;
                } else {
                    window.location.href = 'https://menutech.io/retention';
                }
            } catch (err) {
                log("Unexpected error: " + err.message);
                clearTimeout(fallback);
                window.location.href = 'https://menutech.io/retention';
            }
        }

        init();
    </script>
</body>
</html>
