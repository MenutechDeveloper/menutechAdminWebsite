<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Admin | Menutech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --success: #059669;
            --error: #dc2626;
            --dev: #8b5cf6;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

        /* Modern Gradient Background */
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(255, 149, 51, 0.12) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 149, 51, 0.08) 0%, transparent 40%); }

        .auth-card {
            background: var(--card); width: 100%; max-width: 440px; padding: 60px 45px; border-radius: 40px; border: 1px solid var(--border);
            box-shadow: 0 24px 64px -12px rgba(0,0,0,0.5); position: relative; text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .group { margin-bottom: 24px; text-align: left; }
        .group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--orange); letter-spacing: 0.5px; margin-bottom: 10px; margin-left: 4px; opacity: 0.9; }
        input {
            width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 20px; padding: 18px 22px; color: var(--text); font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255, 149, 51, 0.08); }

        .btn-orange {
            width: 100%; padding: 20px; border-radius: 22px; border: none; background: var(--orange); color: #000; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); margin-top: 12px;
        }
        .btn-orange:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(255, 149, 51, 0.25); }

        .auth-nav { margin-top: 36px; display: flex; flex-direction: column; gap: 14px; }
        .link { background: none; border: none; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .link:hover { color: var(--orange); }

        /* Main App */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 24px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; margin-bottom: 72px; }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 3.2rem; font-weight: 600; letter-spacing: -1.5px; margin-bottom: 6px; }
        header .tag { color: var(--orange); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 4px; opacity: 0.8; }

        /* Scalable UI Layout */
        .dashboard-layout { display: flex; min-height: calc(100vh - 160px); gap: 40px; }

        .sidebar { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; gap: 30px; transition: all 0.3s ease; position: relative; }
        .sidebar.collapsed { width: 60px; overflow: hidden; }
        .sidebar.collapsed .search-box, .sidebar.collapsed #project-info { opacity: 0; pointer-events: none; }
        .main-content { flex: 1; min-width: 0; }

        .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; position: relative; cursor: default; transition: opacity 0.3s; }
        .search-box label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin-bottom: 15px; margin-left: 5px; }
        .search-box input { width: 100%; margin-bottom: 15px; }

        .client-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .client-list::-webkit-scrollbar { width: 4px; }
        .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .client-item { padding: 14px 18px; border-radius: 16px; background: var(--input); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .client-item:hover { border-color: var(--orange); }
        .client-item.active { border-color: var(--orange); background: rgba(255,149,51,0.08); }
        .client-item .name { font-weight: 700; font-size: 0.85rem; display: block; }
        .client-item .domain { font-size: 0.7rem; color: var(--text-dim); }

        .component-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .component-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; }

        .drop-zone {
            width: 100%; height: 200px; border-radius: 36px; border: 2px dashed var(--border); background: var(--card);
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 40px;
        }
        .drop-zone:hover { border-color: var(--orange); background: rgba(255, 149, 51, 0.03); transform: scale(1.01); }
        .drop-zone p { font-weight: 600; font-size: 1.1rem; color: var(--text); }
        .drop-zone span { font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; font-weight: 500; }

        .bento { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr; gap: 28px; }
        .bento::before { content: ""; width: 0; padding-bottom: 100%; grid-column: 1 / 1; grid-row: 1 / 1; }
        .bento > *:first-child { grid-column: 1 / 1; grid-row: 1 / 1; }

        .card { position: relative; border-radius: 32px; overflow: hidden; background: var(--card); border: 1px solid var(--border); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); aspect-ratio: 1/1; }
        .card:hover { transform: translateY(-10px); border-color: var(--orange); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover img { transform: scale(1.06); }

        .del-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; backdrop-filter: blur(6px); }
        .card:hover .del-overlay { opacity: 1; }
        .btn-del { background: var(--error); color: #fff; border: none; padding: 16px 32px; border-radius: 18px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .btn-del:hover { transform: scale(1.05); background: #ff5555; }

        .card.wide { grid-column: span 2; }
        .card.tall { grid-row: span 2; }
        .card.large { grid-column: span 2; grid-row: span 2; }

        #top-nav { position: fixed; top: 30px; left: 30px; right: 30px; background: var(--card); backdrop-filter: blur(20px); padding: 14px 28px; border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 5000; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #user-email { font-weight: 700; font-size: 0.85rem; color: var(--orange); margin-right: 15px; }
        .btn-logout { background: none; border: none; color: var(--text); font-size: 0.8rem; font-weight: 600; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .btn-logout:hover { opacity: 1; color: var(--orange); }

        .theme-switch {
            position: relative; width: 60px; height: 30px; background: #f0e0d0; border-radius: 30px; cursor: pointer; display: flex; align-items: center; padding: 0 5px; transition: 0.4s;
        }
        body.dark-mode .theme-switch { background: #2d333f; }
        .theme-switch-dot {
            width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: 0.4s; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        body.dark-mode .theme-switch-dot { transform: translateX(28px); background: #fff; }

        .theme-switch svg { width: 14px; height: 14px; transition: 0.4s; }
        .sun-icon { color: #ff9533; }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }
        .btn-copy { background: rgba(255, 149, 51, 0.1); border: 1px solid rgba(255, 149, 51, 0.3); color: var(--orange); padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; width: 100%; }
        .btn-copy:hover { background: var(--orange); color: #000; }

        .loader { border: 3px solid rgba(255, 149, 51, 0.1); width: 28px; height: 28px; border-radius: 50%; border-left-color: var(--orange); animation: rotate 1s linear infinite; margin: 0 auto; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        .sidebar-toggle {
            background: var(--orange); border: none; color: #000; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 20px; z-index: 10; transition: transform 0.3s;
        }
        .sidebar.collapsed .sidebar-toggle { transform: rotate(180deg); margin-left: auto; margin-right: auto; }

        .search-box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        @media (max-width: 640px) {
            header h1 { font-size: 2.6rem; }
            .dashboard-layout { flex-direction: column; }
            .sidebar { width: 100%; }
            .sidebar.collapsed { height: 0; width: 100%; }
            .bento { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .card.wide, .card.large { grid-column: span 1; }
            .card.tall, .card.large { grid-row: span 1; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>


    <!-- Domain Init Flow -->
    <div id="domain-init-overlay" class="hidden">
        <div class="auth-card">
            <h2>Configuration</h2>
            <p class="lead" style="margin-bottom: 32px">Enter the domain where your gallery will live.</p>
            <div class="group"><label>Target Domain</label><input type="text" id="init-domain" placeholder="example.com"></div>
            <button id="btn-save-domain" class="btn-orange">Save Configuration</button>
            <div id="init-msg" style="margin-top:20px"></div>
        </div>
    </div>

    <div id="top-nav" class="hidden">
        <div style="display: flex; align-items: center; gap: 20px;">
             <button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="user-email"></div>
            <div class="theme-switch" id="theme-toggle">
                <div class="theme-switch-dot">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM7.05 18.01c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12.12 22C6.53 22 2 17.47 2 11.88c0-4.52 2.71-8.55 6.88-10.32.44-.19.93.12.93.59a.5.5 0 0 1-.01.12c-.27 1.28-.2 2.62.2 3.89.96 3.01 3.4 5.43 6.4 6.38 1.27.4 2.61.47 3.89.2.04-.01.08-.02.12-.02.47 0 .78.49.59.93-1.77 4.17-5.8 6.88-10.32 6.88z"/></svg>
                </div>
            </div>
            <button id="btn-logout" class="btn-logout">Logout</button>
        </div>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <div class="tag">Management Portal</div>
            <h1>Admin Workspace</h1>
            <p id="view-domain-title" style="font-weight: 700; color: var(--orange); font-size: 0.85rem; letter-spacing: 1px;"></p>
        </header>

        <div class="dashboard-layout">
            <!-- Sidebar with Searchable List -->
            <div class="sidebar" id="sidebar">
                <button class="sidebar-toggle" id="sidebar-collapse-btn" title="Toggle Sidebar">«</button>
                <div class="search-box" id="draggable-search">
                    <div class="search-box-header">
                        <label style="margin:0">Find Project</label>
                        <span style="cursor: move; font-size: 1.2rem; color: var(--text-dim);">⠿</span>
                    </div>
                    <input type="text" id="client-search" placeholder="Domain or Name...">
                    <div class="client-list" id="client-list">
                        <!-- Items injected here -->
                    </div>
                </div>

                <div id="project-info" class="switcher-box hidden" style="width: 100%; margin: 0;">
                    <label>Active Project</label>
                    <div id="active-project-name" style="font-weight: 700; padding: 10px 15px; background: var(--input); border-radius: 12px; border: 1px solid var(--border);">None Selected</div>
                </div>
            </div>

            <div class="main-content">
                <!-- Gallery Section -->
                <div id="section-gallery">
                    <div class="component-header">
                        <h2>Gallery Images</h2>
                        <button id="btn-copy-code" class="btn-copy hidden" style="width: auto; margin-top: 0; padding: 12px 24px;">COPY GALLERY CODE</button>
                    </div>

                    <div class="drop-zone" id="drop-zone">
                        <p>Upload Images</p>
                        <span>Click to select or drag files here</span>
                        <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
                    </div>

                    <div id="upload-status" style="text-align:center; margin-bottom:40px; font-weight: 600; font-size: 0.9rem;"></div>
                    <div class="bento" id="gallery-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { MT_CONFIG } from './config.js';
        let sb = null, user = null, userRole = null, activeOwnerId = null, activeDomain = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            initEvents();
            try {
                const { createClient } = await import("https://esm.sh/@supabase/supabase-js");
                sb = createClient(MT_CONFIG.SUPABASE_URL, MT_CONFIG.SUPABASE_KEY);
                await checkSession();
            } catch (err) {
                console.error("Initialization error:", err);
                document.body.innerHTML = `<div style="padding:40px; text-align:center; font-family:sans-serif; color:white;"><h2>Critical Error</h2><p>${err.message}</p><button onclick="location.reload()" style="padding:10px 20px; margin-top:20px; border-radius:10px; border:none; background:#ff9533; cursor:pointer;">Retry</button></div>`;
            }
        });

        async function checkSession() {
            const { data: { session }, error } = await sb.auth.getSession();
            if (error || !session) { location.href = "index.html"; return; }

            user = session.user;
            const { data: profile, error: pError } = await sb.from('profiles').select('*').eq('id', user.id).single();

            if (pError || !profile) {
                userRole = 'owner';
                activeOwnerId = user.id;
                showApp(); // Just show app, editor works even if empty
                return;
            }

            userRole = profile.role;

            if (userRole === 'admin' || userRole === 'developer') {
                initDraggableSearch();
                document.getElementById('btn-copy-code').classList.remove('hidden');
                await setupContextSwitcher();

                if (!activeOwnerId) {
                    activeOwnerId = user.id;
                    activeDomain = profile.domain;
                    document.getElementById('view-domain-title').textContent = activeDomain || "Admin Workspace";
                }
                showApp();
            } else {
                activeOwnerId = user.id;
                activeDomain = profile.domain;
                showApp();
            }
        }

        let allOwners = [];
        async function setupContextSwitcher() {
            if (userRole === 'owner') {
                document.getElementById('sidebar').style.display = 'none';
                return;
            }

            const list = document.getElementById('client-list');
            const search = document.getElementById('client-search');

            if (userRole === 'admin') {
                const { data } = await sb.from('profiles').select('*');
                allOwners = data || [];
            } else {
                const { data: access } = await sb.from('developer_access').select('owner_id').eq('developer_id', user.id);
                const ids = (access || []).map(a => a.owner_id);
                const { data } = await sb.from('profiles').select('*').in('id', ids);
                allOwners = data || [];
            }

            renderOwners(allOwners);

            search.oninput = () => {
                const term = search.value.toLowerCase();
                const filtered = allOwners.filter(o =>
                    (o.username || '').toLowerCase().includes(term) ||
                    (o.domain || '').toLowerCase().includes(term) ||
                    (o.email || '').toLowerCase().includes(term)
                );
                renderOwners(filtered);
            };

            const passedId = sessionStorage.getItem('mt_edit_owner_id');
            if (passedId) {
                sessionStorage.removeItem('mt_edit_owner_id');
                window.switchContext(passedId);
            }
        }

        function renderOwners(owners) {
            const list = document.getElementById('client-list');
            list.innerHTML = owners.map(o => `
                <div class="client-item ${activeOwnerId === o.id ? 'active' : ''}" onclick="switchContext('${o.id}')">
                    <span class="name">${o.username || 'User'}</span>
                    <span class="domain">${o.domain || o.email || o.id.substring(0,8)}</span>
                </div>
            `).join('');
        }

        window.switchContext = (ownerId) => {
            const copyBtn = document.getElementById('btn-copy-code');
            const owner = allOwners.find(o => o.id === ownerId);
            if (!owner) return;

            activeOwnerId = ownerId;
            activeDomain = owner.domain;

            document.getElementById('view-domain-title').textContent = activeDomain || "No Domain Set";
            document.getElementById('active-project-name').textContent = owner.username || owner.email;
            document.getElementById('project-info').classList.remove('hidden');

            if (userRole === 'admin' || userRole === 'developer') {
                copyBtn.classList.remove('hidden');
            }

            renderOwners(allOwners);
            loadGallery();
        }

        function showApp() {
            const main = document.getElementById('main-app');
            const nav = document.getElementById('top-nav');
            if (main) main.classList.remove('hidden');
            if (nav) nav.classList.remove('hidden');
            document.getElementById('user-email').textContent = user.email;

            if (activeOwnerId) {
                if (userRole === 'owner') {
                    document.getElementById('view-domain-title').textContent = activeDomain || "My Gallery";
                }
                loadGallery();
            }
        }


        function initEvents() {
            document.getElementById('sidebar-collapse-btn').onclick = () => {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.toggle('collapsed');
                document.getElementById('sidebar-collapse-btn').textContent = sidebar.classList.contains('collapsed') ? '»' : '«';
            };

            document.getElementById('btn-logout').onclick = async () => {
                if(sb) await sb.auth.signOut();
                location.href = "index.html";
            };
            document.getElementById('btn-copy-code').onclick = copyGalleryCode;
            document.getElementById('btn-save-domain').onclick = saveDomain;

            const dz = document.getElementById('drop-zone'), fi = document.getElementById('file-input');
            dz.onclick = () => fi.click();
            fi.onchange = () => uploadFiles(fi.files);
            dz.ondragover = e => { e.preventDefault(); dz.style.borderColor = "var(--orange)"; };
            ['dragleave', 'dragend'].forEach(t => dz.addEventListener(t, () => dz.style.borderColor = "var(--border)"));
            dz.ondrop = e => { e.preventDefault(); dz.style.borderColor = "var(--border)"; if(e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); };
        }


        async function saveDomain() {
            const v = document.getElementById('init-domain').value.trim(), m = document.getElementById('init-msg');
            if (!v) return;
            const { error } = await sb.from('profiles').upsert({ id: user.id, domain: v });
            if (error) {
                console.error("SaveDomain error:", error);
                m.textContent = "Error saving domain.";
                m.style.color = "var(--error)";
            }
            else { activeDomain = v; showApp(); }
        }

        async function uploadFiles(files) {
            if (!activeOwnerId) return alert("Select a project context first.");
            const s = document.getElementById('upload-status');
            s.innerHTML = '<div class="loader"></div><p style="margin-top:10px">Uploading...</p>';
            for (const f of files) {
                const fd = new FormData();
                fd.append('file', f);
                fd.append('upload_preset', MT_CONFIG.CLOUDINARY.UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${MT_CONFIG.CLOUDINARY.CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                const d = await res.json();
                await sb.from('galeria').insert([{ user_id: activeOwnerId, domain: activeDomain || 'undetermined', image_url: d.secure_url }]);
            }
            s.textContent = "Done"; setTimeout(() => s.textContent = "", 3000); loadGallery();
        }

        async function loadGallery() {
            if (!activeOwnerId) return;
            const g = document.getElementById('gallery-grid');
            g.innerHTML = '<div class="loader"></div>';
            const { data, error } = await sb.from('galeria').select('*').eq('user_id', activeOwnerId).order('created_at', { ascending: false });
            if (error) {
                g.innerHTML = `<p style="color: var(--error); text-align:center; width: 100%; grid-column: 1/-1;">Error loading gallery: ${error.message}</p>`;
                return;
            }
            g.innerHTML = (data || []).map((it, i) => `
                <div class="card ${getBento(i)}">
                    <img src="${it.image_url}" loading="lazy">
                    <div class="del-overlay"><button class="btn-del" onclick="deleteImage('${it.id}')">Delete</button></div>
                </div>
            `).join('');
        }
        function getBento(i) { return ''; }
        window.deleteImage = async (id) => { if(confirm("Confirm deletion?")) { await sb.from('galeria').delete().eq('id', id); loadGallery(); } };

        function copyGalleryCode() {
            if (!activeDomain) return alert("Assign a domain to this project first.");
            const snippet = `<!-- Menutech Gallery -->\n<script src="https://menutech.io/menutechUI.js"><\/script>\n<menutech-gallery domain="${activeDomain}"></menutech-gallery>`;
            navigator.clipboard.writeText(snippet).then(() => {
                const btn = document.getElementById('btn-copy-code');
                const oldText = btn.textContent;
                btn.textContent = "COPIED!";
                setTimeout(() => btn.textContent = oldText, 2000);
            });
        }

        function initDraggableSearch() {
            const dragItem = document.getElementById("draggable-search");
            const header = dragItem.querySelector(".search-box-header");
            let active = false;
            let currentX;
            let currentY;
            let initialX;
            let initialY;
            let xOffset = 0;
            let yOffset = 0;

            header.addEventListener("mousedown", dragStart);
            header.addEventListener("touchstart", dragStart, { passive: false });
            document.addEventListener("mouseup", dragEnd);
            document.addEventListener("touchend", dragEnd);
            document.addEventListener("mousemove", drag);
            document.addEventListener("touchmove", drag, { passive: false });

            function dragStart(e) {
                if (e.type === "touchstart") {
                    initialX = e.touches[0].clientX - xOffset;
                    initialY = e.touches[0].clientY - yOffset;
                } else {
                    initialX = e.clientX - xOffset;
                    initialY = e.clientY - yOffset;
                }

                if (e.target === header || header.contains(e.target)) {
                    active = true;
                }
            }

            function dragEnd(e) {
                initialX = currentX;
                initialY = currentY;
                active = false;
            }

            function drag(e) {
                if (active) {
                    e.preventDefault();
                    if (e.type === "touchmove") {
                        currentX = e.touches[0].clientX - initialX;
                        currentY = e.touches[0].clientY - initialY;
                    } else {
                        currentX = e.clientX - initialX;
                        currentY = e.clientY - initialY;
                    }
                    xOffset = currentX;
                    yOffset = currentY;
                    setTranslate(currentX, currentY, dragItem);
                }
            }

            function setTranslate(xPos, yPos, el) {
                el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
            }
        }

        function initTheme() {
            const toggle = document.getElementById('theme-toggle');
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
            toggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        }
    </script>
</body>
