<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Manager | Menutech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

        :root {
            --orange: #ff9533;
            --bg: #fffcf0;
            --card: #ffffff;
            --input: #fffef5;
            --text: #1a1c1e;
            --text-dim: #4a5568;
            --border: #f8e8d8;
            --error: #dc2626;
            --success: #059669;
            --dev: #8b5cf6;
        }

        body.dark-mode {
            --bg: #121418;
            --card: #1c1f26;
            --input: #242933;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d333f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; opacity: 0; }
        body.ready { opacity: 1; }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 100% 0%, rgba(255, 149, 51, 0.1) 0%, transparent 40%), radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 40%); }

        #top-nav { position: fixed; top: 24px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; z-index: 5000; pointer-events: none; }
        #top-nav > * { pointer-events: auto; }

        /* Premium User Pill */
        #user-display-pill {
            background: var(--card); backdrop-filter: blur(20px); padding: 8px 24px; border-radius: 40px; border: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); min-width: 220px; justify-content: flex-start;
        }
        #user-display-pill:hover { transform: translateY(-2px); border-color: var(--orange); box-shadow: 0 15px 45px rgba(255,149,51,0.15); }

        #user-display-pill.admin-glow {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.admin-glow #user-name, #user-display-pill.admin-glow #user-role-label { color: #3e2b14 !important; }

        #user-display-pill.dev-glow {
            background: linear-gradient(135deg, #70706F 0%, #E9E9E7 20%, #70706F 40%, #E9E9E7 60%, #70706F 80%, #E9E9E7 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.dev-glow #user-name, #user-display-pill.dev-glow #user-role-label { color: #1e293b !important; }

        #user-display-pill.owner-glow {
            background: #000;
            background-image: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 20%, transparent 40%, rgba(255,255,255,0.1) 60%, transparent 80%, rgba(255,255,255,0.1) 100%);
            background-size: 400% 400%; animation: foil-shine 25s ease infinite; border: none !important;
        }
        #user-display-pill.owner-glow #user-name, #user-display-pill.owner-glow #user-role-label { color: #fff !important; }

        #user-display-pill #user-name, #user-display-pill #user-role-label { color: var(--text); transition: color 0.3s; }

        @keyframes foil-shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .pill-info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
        #user-name { font-weight: 800; font-size: 0.85rem; font-family: 'Outfit', sans-serif; text-align: left; }
        #user-role-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }

        .pill-menu { position: absolute; top: calc(100% + 12px); right: 0; background: var(--card) !important; border: 1px solid var(--border); border-radius: 24px; padding: 12px; min-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2); opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000; animation: none !important; }
        #user-display-pill.active .pill-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .pill-menu-item { padding: 12px 18px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .pill-menu-item:hover { background: rgba(255, 149, 51, 0.1); color: var(--orange); }
        .pill-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .theme-switch { width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.4s; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .theme-switch svg { width: 24px; height: 24px; transition: 0.4s; }
        .sun-icon { color: var(--orange); }
        .moon-icon { color: #8b5cf6; display: none; }
        body.dark-mode .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: block; }

        .btn-panel-top { background: var(--orange); color: #fff; border: none; padding: 12px 28px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.4s; letter-spacing: 1.5px; box-shadow: 0 8px 25px rgba(255, 149, 51, 0.3); text-transform: uppercase; }
        .btn-panel-top:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 149, 51, 0.4); }

        header { text-align: center; margin-bottom: 60px; padding-top: 120px; }
        .logo-main { width: 100%; max-width: 280px; height: auto; margin: 0 auto 10px auto; filter: drop-shadow(0 10px 20px rgba(255,149,51,0.15)); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.2rem; margin-bottom: 24px; color: var(--text-dim); display: flex; align-items: center; gap: 12px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .qr-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 60px; min-height: 200px; }
        .qr-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px 32px; display: grid; grid-template-columns: 80px 1.5fr 1.5fr 1fr auto; align-items: center; gap: 24px; transition: 0.4s; }
        .qr-card:hover { border-color: var(--orange); transform: scale(1.005); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .qr-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); cursor: zoom-in; }

        .qr-info h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .qr-info .qr-id { font-size: 0.75rem; color: var(--orange); font-weight: 700; letter-spacing: 1px; }

        .controls { display: flex; flex-direction: column; gap: 8px; }
        .controls input { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-size: 0.85rem; }
        .controls input:focus { border-color: var(--orange); outline: none; }

        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .actions { display: flex; gap: 10px; }
        .btn { padding: 12px 18px; border-radius: 14px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; }
        .btn-save { background: var(--orange); color: #000; }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .loader { width: 30px; height: 30px; border: 3px solid rgba(255, 149, 51, 0.1); border-top-color: var(--orange); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        @media (max-width: 992px) { .qr-card { grid-template-columns: 80px 1fr 1fr; } .actions, .switch-container { grid-column: span 3; justify-content: flex-end; } }
        @media (max-width: 768px) { .qr-card { grid-template-columns: 1fr; text-align: center; } .qr-img { margin: 0 auto; } .actions, .switch-container { grid-column: span 1; justify-content: center; } }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; max-width: 440px; padding: 18px 24px; border-radius: 24px; background: #1c1f26; border: 1px solid var(--border); color: #fff; font-size: 0.9rem; font-weight: 500; box-shadow: 0 12px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), toastFadeOut 0.5s 5.5s forwards; line-height: 1.4; }
        .toast.success { border-left: 6px solid var(--success); }
        .toast.error { border-left: 6px solid var(--error); }
        .toast.warning { border-left: 6px solid var(--orange); }
        @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastFadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Modal Styles */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 40px; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { position: relative; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .modal-img-large { max-width: 100%; max-height: 70vh; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 4px solid #fff; }
        .btn-download { background: var(--orange); color: #000; padding: 16px 32px; border-radius: 20px; font-size: 1rem; font-weight: 800; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.3s; border: none; }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,149,51,0.4); }
        .modal-close { position: absolute; top: -50px; right: 0; color: #fff; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>
    <div id="no-access" class="hidden" style="text-align: center; padding: 100px;">
        <h2 style="font-family: 'Outfit'; font-size: 2rem; margin-bottom: 12px;">Acceso Denegado</h2>
        <button onclick="location.href='index.html'" class="btn btn-save" style="margin-top: 30px">Volver al Login</button>
    </div>

    <div id="top-nav" class="hidden">
        <div><button class="btn-panel-top" onclick="location.href='index.html'">PANEL</button></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-switch" id="theme-toggle">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div id="user-display-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px; height:20px; color: inherit;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <div class="pill-info">
                    <div id="user-name">&nbsp;</div>
                    <div id="user-role-label">&nbsp;</div>
                </div>
                <div class="pill-menu">
                    <a href="index.html" class="pill-menu-item">Inicio</a>
                    <div class="pill-menu-item danger" onclick="logout()">Cerrar Sesión</div>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header><img src="https://menutech.services/assets/img/logomt.png" class="logo-main" alt="Menutech Logo"></header>
        <div class="container">
            <div class="section-title">QR Codes</div>
            <div style="margin-bottom: 30px;"><input type="text" id="qr-search" placeholder="Buscar por restaurante o ID..." style="width: 100%; max-width: 400px; background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 14px 20px; color: var(--text);"></div>
            <div id="qr-list" class="qr-list"></div>
            <div id="loading" class="loader"></div>
        </div>
    </div>

    <script type="module">
        import { MT_CONFIG } from './config.js';
        import { supabase as sb } from './supabase.js';
        let user = null;

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('div');
            icon.innerHTML = type === 'success' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:20px;height:20px;"><polyline points="20 6 9 17 4 12"/></svg>' : type === 'error' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:20px;height:20px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:20px;height:20px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
            const msg = document.createElement('div');
            msg.textContent = message;
            toast.appendChild(icon); toast.appendChild(msg); container.appendChild(toast);
            setTimeout(() => toast.remove(), 6000);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            checkAuth();
        });

        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = "index.html"; return; }
            user = session.user;
            const { data, error } = await sb.from('profiles').select('role, username').eq('id', user.id).single();

            if (data && (data.role === 'CS' || data.role === 'adminCS')) {
                location.href = "index.html";
                return;
            }

            const allowedRoles = ['admin', 'developer', 'design', 'adminDesign', 'retention'];

            if (error || !data || !allowedRoles.includes(data.role)) {
                document.getElementById('no-access').classList.remove('hidden');
                document.body.classList.add('ready');
            }
            else {
                const pill = document.getElementById('user-display-pill');
                document.getElementById('user-name').textContent = data.username || user.email.split('@')[0];
                document.getElementById('user-role-label').textContent = data.role;
                if (data.role === 'admin') pill.classList.add('admin-glow');
                else if (data.role === 'developer') pill.classList.add('dev-glow');

                document.getElementById('app').classList.remove('hidden');
                document.getElementById('top-nav').classList.remove('hidden');
                document.body.classList.add('ready');
                loadQRs();
            }
        }

        let allQRs = [];
        async function loadQRs() {
            const listArea = document.getElementById('qr-list');
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            listArea.innerHTML = "";

            try {
                const { data, error } = await sb.from('qrcodes').select('*').order('created_at', { ascending: false });
                loading.classList.add('hidden');
                if (error) throw error;
                allQRs = data || [];
                renderList(allQRs);

                document.getElementById('qr-search').oninput = (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allQRs.filter(qr => (qr.restaurant_name||'').toLowerCase().includes(term) || (qr.id||'').toLowerCase().includes(term));
                    renderList(filtered);
                };
            } catch (err) {
                loading.classList.add('hidden');
                showToast("Error cargando: " + err.message, 'error');
                listArea.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--error);">Error al cargar los códigos QR.</div>`;
            }
        }

        function renderList(qrs) {
            const list = document.getElementById('qr-list');
            if (qrs.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-dim);">No se encontraron códigos QR.</div>`;
                return;
            }
            list.innerHTML = qrs.map(qr => `
                <div class="qr-card">
                    <img src="${qr.qr_image_url || 'https://via.placeholder.com/80?text=No+QR'}" class="qr-img" onclick="openModal('${qr.qr_image_url}')">
                    <div class="qr-info">
                        <div class="qr-id">ID: ${qr.id}</div>
                        <h3>${qr.restaurant_name || 'Restaurante sin nombre'}</h3>
                    </div>
                    <div class="controls">
                        <input type="text" value="${qr.restaurant_name || ''}" id="name-${qr.id}" placeholder="Nombre del Restaurante">
                        <input type="text" value="${qr.url || ''}" id="url-${qr.id}" placeholder="URL de Destino">
                    </div>
                    <div class="switch-container">
                        Activo
                        <label class="switch">
                            <input type="checkbox" id="active-${qr.id}" ${qr.is_active ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="actions">
                        <button class="btn btn-save" onclick="updateQR('${qr.id}')">GUARDAR</button>
                        <button class="btn btn-del" onclick="deleteQR('${qr.id}')">ELIMINAR</button>
                    </div>
                </div>`).join('');
        }

        window.updateQR = async (id) => {
            const name = document.getElementById(`name-${id}`).value;
            const url = document.getElementById(`url-${id}`).value;
            const active = document.getElementById(`active-${id}`).checked;

            const { error } = await sb.from('qrcodes').update({
                restaurant_name: name,
                url: url,
                is_active: active
            }).eq('id', id);

            if (error) {
                showToast(error.message, "error");
            } else {
                showToast("QR actualizado correctamente", "success");
                loadQRs();
            }
        };

        window.deleteQR = async (id) => {
            if (!confirm('¿Estás seguro de que quieres eliminar este código QR?')) return;
            const { error } = await sb.from('qrcodes').delete().eq('id', id);
            if (error) {
                showToast(error.message, "error");
            } else {
                showToast("QR eliminado correctamente", "success");
                loadQRs();
            }
        };

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle').onclick = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); };
            const pill = document.getElementById('user-display-pill');
            pill.onclick = (e) => { e.stopPropagation(); pill.classList.toggle('active'); };
            document.addEventListener('click', () => pill.classList.remove('active'));
        }

        window.openModal = (url) => {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-img');
            img.src = url;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.downloadImage = async () => {
            const imgUrl = document.getElementById('modal-img').src;
            try {
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'QR-Menutech.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (err) {
                showToast("Error al descargar la imagen", "error");
            }
        };

        window.logout = async () => { await sb.auth.signOut(); location.href = "index.html"; };
    </script>

    <!-- Modal for Image Preview -->
    <div id="image-modal" class="modal-overlay" onclick="closeModal()">
        <button class="modal-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:32px; height:32px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="modal-img-large" alt="Large QR">
            <button id="download-btn" class="btn-download" onclick="downloadImage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:24px; height:24px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                DESCARGAR IMAGEN
            </button>
        </div>
    </div>
</body>
</html>
