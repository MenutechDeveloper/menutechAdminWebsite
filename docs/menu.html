<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menutech | Menu</title>
    <link rel="icon" type="image/png" href="https://menutech.services/assets/img/logomt.png">
    <style>
        body { margin: 0; padding: 0; background: #fcfcfc; }
    </style>
</head>
<body>
    <div id="menu-container"></div>

    <script src="menutechUI.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('n');
            const container = document.getElementById('menu-container');

            if (slug) {
                const menuEl = document.createElement('menutech-platform-orders');
                menuEl.setAttribute('restaurant', slug);
                container.appendChild(menuEl);
            } else {
                container.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif; color: #666;">Menu not found.</div>';
            }
        });
    </script>
</body>
</html>
