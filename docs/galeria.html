<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Component | Menutech</title>
    <!--
        INSTRUCCIONES PARA EL CLIENTE:
        1. Copia este código y pégalo en el HTML de tu sitio web.
        2. Asegúrate de cambiar el atributo 'domain' por tu dominio registrado.
    -->

    <!-- Importar el componente de Menutech -->
    <script src="https://menutech.services/migrar/menutechUI.js"></script>
</head>
<body style="margin:0; background: transparent;">

    <!-- Elemento de la Galería (Bento Grid) -->
    <menutech-gallery domain="example.com"></menutech-gallery>

    <!--
        Nota: Puedes envolver el componente en un div para controlar su ancho, por ejemplo:
        <div style="max-width: 1200px; margin: 0 auto;">
            <menutech-gallery domain="tusitio.com"></menutech-gallery>
        </div>
    -->

</body>
</html>
